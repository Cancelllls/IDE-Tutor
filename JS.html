// ─── Keyboard Shortcuts ──────────────────────────────────
codeInput.addEventListener('keydown', (e) => {
  // IntelliSense navigation
  if (e.key === 'Escape' && suggestionsVisible) {
    e.preventDefault();
    hideSuggestions();
    return;
  }
  if (suggestionsVisible && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
    e.preventDefault();
    if (e.key === 'ArrowDown') {
      selectedSuggestionIdx = (selectedSuggestionIdx + 1) % activeSuggestions.length;
    } else {
      selectedSuggestionIdx = (selectedSuggestionIdx - 1 + activeSuggestions.length) % activeSuggestions.length;
    }
    updateActiveSuggestionSelection();
    return;
  }
  if (suggestionsVisible && (e.key === 'Enter' || e.key === 'Tab')) {
    e.preventDefault();
    insertSelectedSuggestion();
    return;
  }

  // Tab indentation
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = codeInput.selectionStart;
    const end = codeInput.selectionEnd;
    const indent = ' '.repeat(tabSize);
    if (start !== end) {
      // Multi-line indent/dedent
      const text = codeInput.value;
      const beforeSel = text.substring(0, start);
      const selection = text.substring(start, end);
      const afterSel = text.substring(end);
      const lineStart = beforeSel.lastIndexOf('\n') + 1;
      const prefix = text.substring(0, lineStart);
      const block = text.substring(lineStart, end);
      const lines = block.split('\n');
      let modified;
      if (e.shiftKey) {
        modified = lines.map(l => l.startsWith(indent) ? l.substring(tabSize) : (l.startsWith(' ') ? l.replace(/^ +/, m => m.substring(0, Math.max(0, m.length - tabSize))) : l));
      } else {
        modified = lines.map(l => indent + l);
      }
      codeInput.value = prefix + modified.join('\n') + afterSel;
      codeInput.selectionStart = lineStart;
      codeInput.selectionEnd = lineStart + modified.join('\n').length;
    } else {
      codeInput.value = codeInput.value.substring(0, start) + indent + codeInput.value.substring(end);
      codeInput.selectionStart = codeInput.selectionEnd = start + tabSize;
    }
    if (activeFile) { vfsCache[activeFile].content = codeInput.value; dirtyFiles[activeFile] = true; }
    updateLineNumbers();
    highlightCode();
    updateCursorPos();
    return;
  }

  // Smart Enter
  if (e.key === 'Enter') {
    e.preventDefault();
    const cursor = codeInput.selectionStart;
    const text = codeInput.value;
    const before = text.substring(0, cursor);
    const after = text.substring(cursor);
    const lines = before.split('\n');
    const currentLine = lines[lines.length - 1];
    const indentMatch = currentLine.match(/^\s*/);
    let indent = indentMatch ? indentMatch[0] : "";
    const trimmed = currentLine.trim();
    let extraIndent = "";
    if (trimmed.endsWith('{') || trimmed.endsWith(':') || trimmed.endsWith('(') || trimmed.endsWith('[')) {
      extraIndent = ' '.repeat(tabSize);
    }
    // Auto-close brackets
    let closingText = "";
    if (trimmed.endsWith('{') && after.trim().startsWith('}')) {
      // Already has closing bracket
    } else if (trimmed.endsWith('{')) {
      closingText = "\n" + indent + "}";
    }
    const insertText = "\n" + indent + extraIndent;
    codeInput.value = before + insertText + after;
    codeInput.selectionStart = codeInput.selectionEnd = cursor + insertText.length;
    if (activeFile) { vfsCache[activeFile].content = codeInput.value; dirtyFiles[activeFile] = true; }
    updateLineNumbers();
    highlightCode();
    updateCursorPos();
    updateTabUI();
    return;
  }

  // Ctrl+S Save
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveActiveFile();
  }
  // Ctrl+Enter Run
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

document.addEventListener('keydown', (e) => {

  if (e.ctrlKey && e.shiftKey && e.key === 'P') {
    e.preventDefault();
    openCommandPalette();
    return;
  }
  // Ctrl+P: Quick Open (same as command palette for now)
  if (e.ctrlKey && !e.shiftKey && e.key === 'p') {
    e.preventDefault();
    openQuickOpen();
    return;
  }
  // Ctrl+B: Toggle Sidebar
  if (e.ctrlKey && e.key === 'b') {
    e.preventDefault();
    toggleSidebar();
    return;
  }
  // Ctrl+J: Toggle Panel
  if (e.ctrlKey && e.key === 'j') {
    e.preventDefault();
    toggleBottomPanel();
    return;
  }
  // Ctrl+Shift+E: Explorer
  if (e.ctrlKey && e.shiftKey && e.key === 'E') {
    e.preventDefault();
    showSidebarPanel('explorer');
    return;
  }
  // Ctrl+Shift+F: Search
  if (e.ctrlKey && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    showSidebarPanel('search');
    document.getElementById('search-query-input').focus();
    return;
  }
  // Ctrl+Shift+D: Debug
  if (e.ctrlKey && e.shiftKey && e.key === 'D') {
    e.preventDefault();
    showSidebarPanel('debug');
    return;
  }
  // Ctrl+Shift+X: Extensions
  if (e.ctrlKey && e.shiftKey && e.key === 'X') {
    e.preventDefault();
    showSidebarPanel('extensions');
    return;
  }
  // Ctrl+N: New File
  if (e.ctrlKey && e.key === 'n') {
    e.preventDefault();
    openNewFileModal();
    return;
  }
  // Ctrl+W: Close Tab
  if (e.ctrlKey && e.key === 'w') {
    e.preventDefault();
    if (activeFile) closeTab(activeFile);
    return;
  }
  // Escape: Close overlays
  if (e.key === 'Escape') {
    closeCommandPalette();
    closeNewFileModal();
    hideAllContextMenus();
    hideSuggestions();
  }
  // F5: Run
  if (e.key === 'F5') {
    e.preventDefault();
    runCode();
  }
});

  const col = lines[lines.length - 1].length + 1;
  const cursorEl = document.getElementById('status-cursor');
  if (cursorEl) cursorEl.innerText = `Ln ${ln}, Col ${col}`;
  const langEl = document.getElementById('status-language');
  if (langEl) langEl.innerText = getLangDisplay(activeLanguage);
  const indentEl = document.getElementById('status-indent');
  if (indentEl) indentEl.innerText = `Spaces: ${tabSize}`;

    cpp: 'C++', java: 'Java', rust: 'Rust', go: 'Go', ruby: 'Ruby',
    sql: 'SQL', html: 'HTML', css: 'CSS'

// ─── Line Numbers ────────────────────────────────────────
function updateLineNumbers() {
  if (!activeFile) return;
  const count = codeInput.value.split('\n').length;
  lineNumbers.innerHTML = "";
  const fileProbs = activeFileProblems[activeFile] || [];
  for (let i = 1; i <= count; i++) {
    const div = document.createElement('div');
    div.className = 'line-num-item';
    div.innerText = i;
    const prob = fileProbs.find(p => p.line === i);
    if (prob) {
      div.classList.add(prob.severity === 'error' ? 'gutter-error' : 'gutter-warning');
      div.title = prob.message;
    }
    lineNumbers.appendChild(div);
  }
}

// ─── Sidebar Panel Switching ─────────────────────────────
function showSidebarPanel(panelName) {
  const panels = ['explorer', 'search', 'scm', 'debug', 'extensions', 'settings'];
  document.querySelectorAll('.activity-icon').forEach(icon => icon.classList.remove('active'));
  const currentPanel = document.querySelector('.sidebar-panel:not([style*="display: none"])');
  const currentName = currentPanel ? currentPanel.id.replace('-panel', '') : null;

  if (sidebar.style.display !== 'none' && currentName === panelName) {
    sidebar.style.display = 'none';

  sidebar.style.display = 'flex';
  sidebarVisible = true;
  panels.forEach(p => {
    const panel = document.getElementById(`${p}-panel`);
    if (panel) {
      if (p === panelName) {
        panel.style.display = 'flex';
        const icon = document.getElementById(`icon-${p}`);
        if (icon) icon.classList.add('active');
      } else {
        panel.style.display = 'none';
      }

  });

// ─── Syntax Highlighting Engine ──────────────────────────
function getTokens(text, lang) {
  const rules = tokenizerRules[lang] || tokenizerRules['javascript'];
  const matches = [];
  for (let [type, regex] of Object.entries(rules)) {
    let r = new RegExp(regex.source, regex.flags.includes('g') ? regex.flags : regex.flags + 'g');
    let m;
    while ((m = r.exec(text)) !== null) {
      matches.push({ start: m.index, end: r.lastIndex, type: type, text: m[0] });
      if (m.index === r.lastIndex) r.lastIndex++;
    }
  }
  matches.sort((a, b) => a.start !== b.start ? a.start - b.start : (b.end - b.start) - (a.end - a.start));
  const kept = [];
  let lastEnd = 0;
  for (let match of matches) {
    if (match.start >= lastEnd) {
      kept.push(match);
      lastEnd = match.end;
    }
  }
  return kept;
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function highlightCode(markerIndex = -1) {
  const text = codeInput.value;
  const tokens = getTokens(text, activeLanguage);
  let html = "";
  let currentIndex = 0;

  function appendText(start, end) {
    let sub = text.substring(start, end);
    if (markerIndex >= start && markerIndex <= end) {
      let relIdx = markerIndex - start;
      return escapeHtml(sub.substring(0, relIdx)) + '<span id="intellisense-marker"></span>' + escapeHtml(sub.substring(relIdx));
    }
    return escapeHtml(sub);
  }

  for (let token of tokens) {
    if (token.start > currentIndex) html += appendText(currentIndex, token.start);
    if (markerIndex >= token.start && markerIndex <= token.end) {
      let relStart = markerIndex - token.start;
      html += `<span class="token-${token.type}">${escapeHtml(token.text.substring(0, relStart))}<span id="intellisense-marker"></span>${escapeHtml(token.text.substring(relStart))}</span>`;
    } else {
      html += `<span class="token-${token.type}">${escapeHtml(token.text)}</span>`;
    }
    currentIndex = token.end;
  }
  if (currentIndex < text.length) html += appendText(currentIndex, text.length);
  if (markerIndex === text.length) html += '<span id="intellisense-marker"></span>';

  // Wrap lines with problem indicators
  const lines = html.split('\n');
  let finalHtml = "";
  const fileProbs = activeFile ? (activeFileProblems[activeFile] || []) : [];
  lines.forEach((lineHtml, index) => {
    const lineNum = index + 1;
    const prob = fileProbs.find(p => p.line === lineNum);
    let className = "editor-line-normal";
    if (prob) className = prob.severity === 'error' ? "editor-line-error" : "editor-line-warning";
    finalHtml += `<div class="${className}">${lineHtml || " "}</div>`;
  });
  codeContentLayer.innerHTML = finalHtml;
}

  } else {

// ─── IntelliSense ────────────────────────────────────────
function fuzzyMatch(str, pattern) {
  pattern = pattern.toLowerCase();
  str = str.toLowerCase();
  let pIdx = 0;
  for (let i = 0; i < str.length; i++) {
    if (str[i] === pattern[pIdx]) { pIdx++; if (pIdx === pattern.length) return true; }
  }
  return false;
}

function scanLocalSymbols(text) {
  const symbols = [];
  const seen = new Set();
  const regexes = [
    /\b(?:function|fn|def|let|const|var|int|double|float|char|bool|class)\s+([a-zA-Z_]\w*)\b/g,
    /\b([a-zA-Z_]\w*)\s*=\s*(?![=])/g
  ];
  const dbKeywords = (IntelliSenseDb[activeLanguage] || []).map(x => x.name);
  for (let regex of regexes) {
    let r = new RegExp(regex.source, 'g');
    let match;
    while ((match = r.exec(text)) !== null) {
      const name = match[1];
      if (name && !seen.has(name) && name.length > 1 && !dbKeywords.includes(name)) {
        seen.add(name);
        symbols.push({ name, type: "V", desc: `Local symbol: "${name}"` });
      }
    }
  }
  return symbols;
}

function triggerIntelliSense() {
  const textBefore = codeInput.value.substring(0, codeInput.selectionStart);
  const lastWordMatch = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
  const prefix = lastWordMatch ? lastWordMatch[0] : "";
  if (prefix.length < 1) { hideSuggestions(); return; }

  const langDb = IntelliSenseDb[activeLanguage] || [];
  const locals = scanLocalSymbols(codeInput.value);
  const fullList = [...langDb, ...locals];
  const matches = fullList.filter(item => fuzzyMatch(item.name, prefix));
  matches.sort((a, b) => {
    const aS = a.name.toLowerCase().startsWith(prefix.toLowerCase());
    const bS = b.name.toLowerCase().startsWith(prefix.toLowerCase());
    if (aS && !bS) return -1;
    if (!aS && bS) return 1;
    return a.name.localeCompare(b.name);
  });

  activeSuggestions = matches.slice(0, 15);
  if (activeSuggestions.length > 0) {
    selectedSuggestionIdx = 0;
    renderSuggestionsMenu();
    positionSuggestionsMenu();
  } else {
    hideSuggestions();
  }
}

function hideSuggestions() {
  suggestionsMenu.style.display = 'none';
  suggestionsVisible = false;
}

function renderSuggestionsMenu() {
  suggestionsList.innerHTML = "";
  activeSuggestions.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = `suggestion-item ${idx === selectedSuggestionIdx ? 'selected' : ''}`;
    const iconLabel = item.type || 'K';
    div.innerHTML = `<div class="suggestion-content"><span class="suggestion-icon icon-${iconLabel}">${iconLabel}</span><span>${escapeHtml(item.name)}</span></div>`;
    div.addEventListener('click', () => { selectedSuggestionIdx = idx; insertSelectedSuggestion(); });
    suggestionsList.appendChild(div);
  });
  const activeItem = activeSuggestions[selectedSuggestionIdx];
  suggestionsDoc.innerText = activeItem ? activeItem.desc : "";
  suggestionsVisible = true;
}

function updateActiveSuggestionSelection() {
  const items = suggestionsList.querySelectorAll('.suggestion-item');
  items.forEach((div, idx) => {
    div.classList.toggle('selected', idx === selectedSuggestionIdx);
    if (idx === selectedSuggestionIdx) div.scrollIntoView({ block: 'nearest' });
  });
  const activeItem = activeSuggestions[selectedSuggestionIdx];
  suggestionsDoc.innerText = activeItem ? activeItem.desc : "";
}

function positionSuggestionsMenu() {
  const selectionStart = codeInput.selectionStart;
  highlightCode(selectionStart);
  const marker = document.getElementById('intellisense-marker');
  if (marker) {
    const rect = marker.getBoundingClientRect();
    const wrapperRect = document.querySelector('.editor-wrapper').getBoundingClientRect();
    let top = rect.bottom - wrapperRect.top + 2;
    let left = rect.left - wrapperRect.left;
    if (left + 480 > window.innerWidth) left = window.innerWidth - 500;
    if (top + 250 > window.innerHeight) top = rect.top - wrapperRect.top - 255;
    suggestionsMenu.style.top = `${top}px`;
    suggestionsMenu.style.left = `${left}px`;
    suggestionsMenu.style.display = 'flex';
  }
}

function insertSelectedSuggestion() {
  const item = activeSuggestions[selectedSuggestionIdx];
  if (!item) return;
  const textBefore = codeInput.value.substring(0, codeInput.selectionStart);
  const lastWordMatch = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
  const prefix = lastWordMatch ? lastWordMatch[0] : "";
  const start = codeInput.selectionStart - prefix.length;
  const end = codeInput.selectionStart;
  let insertText = item.name;
  if (item.type === 'S' && item.body) {
    insertText = expandSnippet(item.body).text;
  }
  codeInput.value = codeInput.value.substring(0, start) + insertText + codeInput.value.substring(end);
  codeInput.selectionStart = codeInput.selectionEnd = start + insertText.length;
  if (activeFile) { vfsCache[activeFile].content = codeInput.value; dirtyFiles[activeFile] = true; }
  updateTabUI();
  updateLineNumbers();
  highlightCode();
  updateCursorPos();
  hideSuggestions();
  syncLivePreview();
  codeInput.focus();
}

function expandSnippet(body) {
  let text = body.replace(/\$\{\d+:?([^}]*)\}/g, '$1').replace(/\$\d/g, '');
  return { text };
}

// ─── Language Detection ──────────────────────────────────
function detectLanguage(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const map = {
    js: 'javascript', gs: 'gas', py: 'python', cpp: 'cpp', h: 'cpp',
    java: 'java', rs: 'rust', go: 'go', rb: 'ruby', sql: 'sql',
    html: 'html', css: 'css', json: 'javascript', md: 'html', txt: 'javascript'
  };
  return map[ext] || 'javascript';
}

// ─── File Operations ─────────────────────────────────────
function openNewFileModal() {
  const modal = document.getElementById('new-file-modal');
  const input = document.getElementById('new-file-input');
  const err = document.getElementById('new-file-error');
  input.value = "";
  if (err) err.style.display = "none";
  modal.style.display = "flex";
  setTimeout(() => input.focus(), 50);
}

function closeNewFileModal() {
  document.getElementById('new-file-modal').style.display = "none";
}

function submitNewFile() {
  const input = document.getElementById('new-file-input');
  const err = document.getElementById('new-file-error');
  const filename = input.value.trim();
  if (!filename || filename.includes('/') || filename.includes('\\')) {
    if (err) { err.innerText = "Please enter a valid filename."; err.style.display = "block"; }
    return;
  }
  if (vfsCache[filename]) {
    if (err) { err.innerText = "File already exists."; err.style.display = "block"; }
    return;
  }
  const lang = detectLanguage(filename);
  let content = "";
  if (lang === 'python') content = "# Python File\nprint('Hello World')\n";
  else if (lang === 'cpp') content = '#include <iostream>\nusing namespace std;\n\nint main() {\n  cout << "Hello World" << endl;\n  return 0;\n}\n';
  else if (lang === 'html') content = '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>New Page</title>\n</head>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>\n';
  else if (lang === 'java') content = 'public class Main {\n  public static void main(String[] args) {\n    System.out.println("Hello World");\n  }\n}\n';
  else content = `// ${filename}\n`;

  google.script.run
    .withSuccessHandler(() => {
      vfsCache[filename] = { content, language: lang };
      closeNewFileModal();
      renderFileList();
      loadFileContent(filename);
      showNotification(`Created ${filename}`);
    })
    .withFailureHandler((errObj) => {
      if (err) { err.innerText = "Error: " + errObj.message; err.style.display = "block"; }
    })
    .vfsWriteFile(filename, content, lang);
}

// Modal key events
document.getElementById('new-file-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); submitNewFile(); }
  if (e.key === 'Escape') { e.preventDefault(); closeNewFileModal(); }
});

function loadFileContent(filename) {
  if (activeFile && vfsCache[activeFile]) {
    vfsCache[activeFile].content = codeInput.value;
  }
  activeFile = filename;
  activeLanguage = detectLanguage(filename);

  const breadcrumb = document.getElementById('breadcrumb-filename');
  if (breadcrumb) {
    breadcrumb.innerHTML = filename ? `${getFileIconSVG(filename)} <span style="margin-left:4px">${filename}</span>` : '<span>none</span>';
  }
  updateTitleFilename();

  const fileData = vfsCache[filename] || { content: "", language: activeLanguage };
  codeInput.value = fileData.content;

  runLinter();
  updateCursorPos();
  syncLivePreview();

  if (!openFiles.includes(filename)) openFiles.push(filename);
  updateTabUI();
  updateFileListActive();
}

function updateTitleFilename() {
  const titleEl = document.getElementById('title-filename');
  if (titleEl) {
    const dirty = activeFile && dirtyFiles[activeFile] ? '● ' : '';
    titleEl.innerText = activeFile ? `${dirty}${activeFile} - GAS Cloud IDE` : 'GAS Cloud IDE';
  }
}

function saveActiveFile() {
  if (!activeFile) return;
  const content = codeInput.value;
  vfsCache[activeFile].content = content;
  showNotification(`Saving ${activeFile}...`, 'info');

  google.script.run
    .withSuccessHandler(() => {
      dirtyFiles[activeFile] = false;
      updateTabUI();
      updateTitleFilename();
      showNotification(`${activeFile} saved`, 'success');
    })
    .withFailureHandler((err) => {
      showNotification(`Save failed: ${err.message}`, 'error');
    })
    .vfsWriteFile(activeFile, content, activeLanguage);
}

function deleteFile(filename, event) {
  if (event) event.stopPropagation();
  if (!confirm(`Delete "${filename}"?`)) return;

  google.script.run
    .withSuccessHandler(() => {
      openFiles = openFiles.filter(f => f !== filename);
      delete dirtyFiles[filename];
      delete vfsCache[filename];
      if (activeFile === filename) {
        activeFile = openFiles.length > 0 ? openFiles[0] : Object.keys(vfsCache)[0] || null;
        if (activeFile) loadFileContent(activeFile);
        else {
          codeInput.value = "";
          activeLanguage = 'javascript';
          updateLineNumbers();
          highlightCode();
          updateCursorPos();
          syncLivePreview();
          document.getElementById('breadcrumb-filename').innerHTML = '<span>none</span>';
          updateTitleFilename();
        }
      }
      renderFileList();
      updateTabUI();
      showNotification(`Deleted ${filename}`);
    })
    .withFailureHandler((err) => {
      showNotification(`Delete failed: ${err.message}`, 'error');
    })
    .vfsDeleteFile(filename);
}

      renderFileList();

      showNotification("VFS Init Failed: " + err.message, 'error');

function updateTabUI() {
  tabsBar.innerHTML = "";
  openFiles.forEach(filename => {
    const tab = document.createElement('div');
    tab.className = `tab ${filename === activeFile ? 'active' : ''}`;
    const icon = getFileIconSVG(filename);

    tab.innerHTML = `
      <span class="tab-icon">${icon}</span>

        ? '<span class="dirty-indicator"></span>'

      }

  if (event) event.stopPropagation();
  openFiles = openFiles.filter(f => f !== filename);

    activeFile = openFiles.length > 0 ? openFiles[openFiles.length - 1] : Object.keys(vfsCache)[0] || null;

    else {
      codeInput.value = "";

      highlightCode();
      updateCursorPos();

      document.getElementById('breadcrumb-filename').innerHTML = '<span>none</span>';

// ─── Search Across Files ─────────────────────────────────
function performCrossFileSearch() {
  const query = document.getElementById('search-query-input').value;
  const resultsContainer = document.getElementById('search-results');
  resultsContainer.innerHTML = "";
  if (!query) {
    document.getElementById('search-results-count').innerText = "";
    return;
  }
  let totalMatches = 0;
  Object.entries(vfsCache).forEach(([filename, fileData]) => {
    const lines = fileData.content.split('\n');
    const fileMatches = [];
    lines.forEach((line, index) => {
      if (line.toLowerCase().includes(query.toLowerCase())) {
        fileMatches.push({ lineNum: index + 1, text: line });
      }
    });
    if (fileMatches.length > 0) {
      totalMatches += fileMatches.length;
      const block = document.createElement('div');
      block.className = 'search-file-block';
      block.innerHTML = `
        <div class="search-file-header" onclick="toggleSearchBlock(this)">
          <span class="chevron">\u25bc</span>
          ${getFileIconSVG(filename)}
          <span>${filename}</span>
          <span class="match-count">${fileMatches.length}</span>
        </div>
        <div class="search-file-matches">
          ${fileMatches.map(m => `
            <div class="search-match-item" onclick="openFileAtLine('${filename}', ${m.lineNum})">
              <span class="match-line-num">${m.lineNum}</span>
              <span>${escapeHtml(m.text.trim())}</span>
            </div>
          `).join('')}
        </div>
      `;
      resultsContainer.appendChild(block);
    }
  });
  document.getElementById('search-results-count').innerText = `${totalMatches} result${totalMatches !== 1 ? 's' : ''} in ${Object.keys(vfsCache).length} files`;
}

function toggleSearchBlock(elem) {
  const container = elem.nextElementSibling;
  const chevron = elem.querySelector('.chevron');
  if (container.style.display === 'none') {
    container.style.display = 'block';
    chevron.textContent = '\u25bc';
  } else {
    container.style.display = 'none';
    chevron.textContent = '\u25b6';
  }
}

function openFileAtLine(filename, lineNum) {
  loadFileContent(filename);
  const lines = codeInput.value.split('\n');
  let charIndex = 0;
  for (let i = 0; i < Math.min(lineNum - 1, lines.length); i++) {
    charIndex += lines[i].length + 1;
  }
  codeInput.focus();
  codeInput.selectionStart = codeInput.selectionEnd = charIndex;
  updateCursorPos();
  const scrollContainer = document.getElementById('editor-scroll');
  const lineHt = Number(getComputedStyle(document.documentElement).getPropertyValue('--line-height').replace('px', ''));
  scrollContainer.scrollTop = Math.max(0, (lineNum - 5) * lineHt);
}

// ─── Code Execution ──────────────────────────────────────
function runCode() {
  if (!activeFile || executionActive) return;
  if (dirtyFiles[activeFile]) saveActiveFile();

  executionInputBuffer = [];
  executionActive = true;
  if (runBtn) { runBtn.disabled = true; runBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg> Running...'; }

  clearProblems();
  switchPanelTab('terminal');
  terminalOutput.innerHTML = "\x1b[90m> Compiling and executing...\x1b[0m\n";
  terminalOutput.style.color = "";
  executeStep();
}

function executeStep() {
  google.script.run
    .withSuccessHandler((responseStr) => {
      handleExecutionResponse(JSON.parse(responseStr));
    })
    .withFailureHandler((err) => {
      showTerminalError(err.message);
    })
    .compileAndRun(activeFile, codeInput.value, activeLanguage, executionInputBuffer);
}

function handleExecutionResponse(response) {
  terminalOutput.innerHTML = "";
  if (response.logs && response.logs.length > 0) {
    terminalOutput.innerText = response.logs.join('\n') + '\n';
  }
  if (response.status === 'success') {
    terminalOutput.innerText += "\n\x1b[32m✓ Process exited with code 0\x1b[0m\n";
    resetRunningUI();
  } else if (response.status === 'waiting_for_input') {
    const inputRow = document.createElement('div');
    inputRow.className = 'terminal-input-row';
    inputRow.innerHTML = `<span style="color:var(--accent)">\u276f </span><input type="text" id="terminal-cli-input" autocomplete="off" autofocus />`;
    terminalOutput.appendChild(inputRow);
    const cliInput = document.getElementById('terminal-cli-input');
    cliInput.focus();
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
    cliInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = cliInput.value;
        executionInputBuffer.push(val);
        inputRow.innerHTML = `<span style="color:var(--accent)">\u276f </span><span>${escapeHtml(val)}</span>`;
        executeStep();
      }
    });
  } else if (response.status === 'error') {
    terminalOutput.innerText += `\n\x1b[31m✗ Error: ${response.message}\x1b[0m\n`;
    logProblem(response.message);
    resetRunningUI();
  }
  terminalOutput.scrollTop = terminalOutput.scrollHeight;
}

function showTerminalError(message) {
  terminalOutput.innerText += `\n\x1b[31m✗ Fatal: ${message}\x1b[0m\n`;
  resetRunningUI();
}

function resetRunningUI() {
  executionActive = false;
  if (runBtn) {
    runBtn.disabled = false;
    runBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg> Run and Debug';
  }
  const debugVars = document.getElementById('debugger-vars');
  if (debugVars) debugVars.innerText = `File: ${activeFile}\nStatus: Stopped\nInputs consumed: ${executionInputBuffer.length}`;
}

// ─── Problems & Linting ──────────────────────────────────
function logProblem(message) {
  const lineMatch = message.match(/Line\s+(\d+)/i) || message.match(/:(\d+)/);
  const targetLine = lineMatch ? Number(lineMatch[1]) : 1;
  if (!runtimeProblems[activeFile]) runtimeProblems[activeFile] = [];
  runtimeProblems[activeFile].push({ line: targetLine, severity: 'error', message });
  updateProblemsUI();
}

function clearProblems() {
  if (activeFile) { runtimeProblems[activeFile] = []; updateProblemsUI(); }
}

function checkBrackets(content) {
  const stack = [];
  const problems = [];
  let inString = false, stringChar = "", inComment = false, inMultiLineComment = false;
  const lines = content.split('\n');
  for (let r = 0; r < lines.length; r++) {
    const line = lines[r];
    for (let c = 0; c < line.length; c++) {
      const ch = line[c], next = line[c + 1] || "";
      if (inComment) break;
      if (inMultiLineComment) { if (ch === '*' && next === '/') { inMultiLineComment = false; c++; } continue; }
      if (ch === '/' && next === '/' && !inString) { inComment = true; break; }
      if (ch === '/' && next === '*' && !inString) { inMultiLineComment = true; c++; continue; }
      if (inString) { if (ch === '\\') c++; else if (ch === stringChar) inString = false; continue; }
      if (ch === '"' || ch === "'" || ch === '`') { inString = true; stringChar = ch; continue; }
      if ('{(['.includes(ch)) stack.push({ char: ch, line: r + 1, col: c + 1 });
      else if ('})]'.includes(ch)) {
        if (stack.length === 0) {
          problems.push({ line: r + 1, severity: 'error', message: `Unexpected '${ch}' without matching bracket.` });
        } else {
          const top = stack.pop();
          const expected = { '{': '}', '(': ')', '[': ']' }[top.char];
          if (ch !== expected) problems.push({ line: r + 1, severity: 'error', message: `Mismatched bracket: expected '${expected}' but found '${ch}'.` });
        }
      }
    }
    inComment = false;
  }
  while (stack.length > 0) {
    const top = stack.pop();
    problems.push({ line: top.line, severity: 'error', message: `Unclosed '${top.char}'.` });
  }
  return problems;
}

function runLinter() {
  if (!activeFile) return;
  const content = codeInput.value;
  const lang = activeLanguage;
  const problems = [...checkBrackets(content)];

  if (['java', 'cpp', 'javascript', 'gas'].includes(lang)) {
    const lines = content.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const trimmed = lines[i].trim();
      if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('/*') || trimmed.startsWith('*') || trimmed.startsWith('#')) continue;
      const stmtRegex = /\b(let|const|var|int|double|float|char|boolean|String|return|cout|cin|printf|System\.out)\b/;
      if (stmtRegex.test(trimmed) && !trimmed.endsWith(';') && !trimmed.endsWith('{') && !trimmed.endsWith('}') && !trimmed.endsWith(',') && !trimmed.endsWith('(') && !trimmed.endsWith('[')) {
        problems.push({ line: i + 1, severity: 'warning', message: 'Missing semicolon.' });
      }
    }
  }
  lintProblems[activeFile] = problems;
  updateProblemsUI();
}

function updateProblemsUI() {
  if (!activeFile) return;
  const lP = lintProblems[activeFile] || [];
  const rP = runtimeProblems[activeFile] || [];
  activeFileProblems[activeFile] = [...rP, ...lP];

  updateLineNumbers();
  highlightCode();

  const pane = document.getElementById('problems-output');
  const badge = document.getElementById('problems-count');
  const errorCountEl = document.getElementById('error-count');
  const warningCountEl = document.getElementById('warning-count');
  const allProblems = [];
  Object.entries(activeFileProblems).forEach(([filename, probs]) => {
    probs.forEach(p => allProblems.push({ filename, ...p }));
  });

  const errors = allProblems.filter(p => p.severity === 'error').length;
  const warnings = allProblems.filter(p => p.severity === 'warning').length;
  if (errorCountEl) errorCountEl.innerText = errors;
  if (warningCountEl) warningCountEl.innerText = warnings;

  if (allProblems.length === 0) {
    if (pane) pane.innerHTML = '<div style="padding:12px;color:var(--text-dark);font-size:13px">No problems have been detected in the workspace.</div>';
    if (badge) badge.style.display = "none";
  } else {
    if (pane) pane.innerHTML = "";
    if (badge) { badge.innerText = allProblems.length; badge.style.display = "inline-block"; }
    allProblems.forEach(p => {
      const div = document.createElement('div');
      div.className = 'problem-item';
      const color = p.severity === 'error' ? 'var(--error-fg)' : 'var(--warning-fg)';
      const icon = p.severity === 'error' ? '\u26d4' : '\u26a0';
      div.innerHTML = `<span style="color:${color}">${icon}</span> <span style="flex:1;color:${color}">${escapeHtml(p.message)}</span> <span style="color:var(--text-dark);font-size:11px">${p.filename}:${p.line}</span>`;
      div.addEventListener('click', () => openFileAtLine(p.filename, p.line));
      pane.appendChild(div);
    });
  }
}

// ─── Command Palette ─────────────────────────────────────
const commandPaletteCommands = [
  { name: "New File", action: () => openNewFileModal(), keybinding: "Ctrl+N" },
  { name: "Save File", action: () => saveActiveFile(), keybinding: "Ctrl+S" },
  { name: "Run Code", action: () => runCode(), keybinding: "F5" },
  { name: "Toggle Sidebar", action: () => toggleSidebar(), keybinding: "Ctrl+B" },
  { name: "Toggle Terminal", action: () => toggleBottomPanel(), keybinding: "Ctrl+J" },
  { name: "Show Explorer", action: () => showSidebarPanel('explorer'), keybinding: "Ctrl+Shift+E" },
  { name: "Show Search", action: () => showSidebarPanel('search'), keybinding: "Ctrl+Shift+F" },
  { name: "Show Debug", action: () => showSidebarPanel('debug'), keybinding: "Ctrl+Shift+D" },
  { name: "Clear Terminal", action: () => clearTerminal() },
  { name: "Theme: Dark+ (Default)", action: () => changeTheme('darkplus') },
  { name: "Theme: Monokai", action: () => changeTheme('monokai') },
  { name: "Theme: Dracula", action: () => changeTheme('dracula') },
  { name: "Theme: Solarized Dark", action: () => changeTheme('solarized') },
  { name: "Theme: GitHub Dark", action: () => changeTheme('github-dark') },
  { name: "Font Size: 12px", action: () => changeFontSize(12) },
  { name: "Font Size: 14px", action: () => changeFontSize(14) },
  { name: "Font Size: 16px", action: () => changeFontSize(16) },
  { name: "Font Size: 18px", action: () => changeFontSize(18) },
  { name: "Toggle Word Wrap", action: () => { const el = document.getElementById('settings-wrap-toggle'); toggleWordWrap(!el.checked); } },
  { name: "Show Settings", action: () => showSidebarPanel('settings') },
  { name: "Close Active Tab", action: () => { if (activeFile) closeTab(activeFile); }, keybinding: "Ctrl+W" }
];

function openCommandPalette() {
  const overlay = document.getElementById('command-palette-overlay');
  const input = document.getElementById('command-palette-input');
  overlay.style.display = 'flex';
  input.value = '> ';
  setTimeout(() => { input.focus(); input.selectionStart = input.selectionEnd = input.value.length; }, 50);
  filterCommandPalette();
}

function openQuickOpen() {
  const overlay = document.getElementById('command-palette-overlay');
  const input = document.getElementById('command-palette-input');
  overlay.style.display = 'flex';
  input.value = '';
  input.placeholder = 'Search files by name';
  setTimeout(() => input.focus(), 50);
  filterCommandPalette();
}

function closeCommandPalette() {
  const overlay = document.getElementById('command-palette-overlay');
  if (overlay) {
    overlay.style.display = 'none';
    const input = document.getElementById('command-palette-input');
    if (input) input.placeholder = 'Type a command...';
  }
}

function filterCommandPalette() {
  const input = document.getElementById('command-palette-input');
  const results = document.getElementById('command-palette-results');
  const query = input.value.replace(/^>\s*/, '').toLowerCase();
  results.innerHTML = '';

  if (!input.value.startsWith('>')) {
    // File quick open mode
    const files = Object.keys(vfsCache).filter(f => !query || f.toLowerCase().includes(query));
    files.forEach(filename => {
      const div = document.createElement('div');
      div.className = 'command-result-item';
      div.innerHTML = `<span style="display:flex;align-items:center;gap:8px">${getFileIconSVG(filename)} ${filename}</span>`;
      div.addEventListener('click', () => { closeCommandPalette(); loadFileContent(filename); });
      results.appendChild(div);
    });
    return;
  }

  const filtered = commandPaletteCommands.filter(cmd => !query || cmd.name.toLowerCase().includes(query));
  filtered.forEach((cmd, idx) => {
    const div = document.createElement('div');
    div.className = `command-result-item ${idx === 0 ? 'selected' : ''}`;
    div.innerHTML = `<span>${cmd.name}</span>${cmd.keybinding ? `<span class="command-result-keybinding">${cmd.keybinding}</span>` : ''}`;
    div.addEventListener('click', () => { closeCommandPalette(); cmd.action(); });
    results.appendChild(div);
  });
}

document.getElementById('command-palette-input').addEventListener('keydown', (e) => {
  const results = document.getElementById('command-palette-results');
  const items = results.querySelectorAll('.command-result-item');
  let selectedIdx = Array.from(items).findIndex(i => i.classList.contains('selected'));

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (items.length > 0) {
      items.forEach(i => i.classList.remove('selected'));
      selectedIdx = (selectedIdx + 1) % items.length;
      items[selectedIdx].classList.add('selected');
      items[selectedIdx].scrollIntoView({ block: 'nearest' });
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (items.length > 0) {
      items.forEach(i => i.classList.remove('selected'));
      selectedIdx = (selectedIdx - 1 + items.length) % items.length;
      items[selectedIdx].classList.add('selected');
      items[selectedIdx].scrollIntoView({ block: 'nearest' });
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const selected = results.querySelector('.command-result-item.selected');
    if (selected) selected.click();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    closeCommandPalette();
  }
});

// ─── Context Menus ───────────────────────────────────────
function toggleContextMenu(event, menuId) {
  event.stopPropagation();
  hideAllContextMenus();
  const menu = document.getElementById(menuId);
  if (!menu) return;
  const rect = event.target.getBoundingClientRect();
  menu.style.left = `${rect.left}px`;
  menu.style.top = `${rect.bottom}px`;
  menu.style.display = 'block';
}

function hideAllContextMenus() {
  document.querySelectorAll('.context-menu').forEach(m => m.style.display = 'none');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.context-menu') && !e.target.closest('.menu-item')) {
    hideAllContextMenus();
  }
});

// ─── Notifications ───────────────────────────────────────
function showNotification(message, type = 'info') {
  const container = document.getElementById('notification-container');
  if (!container) return;
  const notif = document.createElement('div');
  notif.className = 'notification';
  const colors = { info: 'var(--accent)', success: 'var(--success-fg)', error: 'var(--error-fg)', warning: 'var(--warning-fg)' };
  notif.style.borderLeftColor = colors[type] || colors.info;
  notif.style.borderLeft = `3px solid ${colors[type] || colors.info}`;
  notif.innerHTML = `
    <span style="flex:1">${escapeHtml(message)}</span>
    <button class="notification-close" onclick="this.parentElement.remove()">\u2715</button>
  `;
  container.appendChild(notif);
  setTimeout(() => { if (notif.parentElement) notif.remove(); }, 4000);
}

// ─── Find and Replace ────────────────────────────────────
function openFindReplace() {
  // Focus the search panel for now
  showSidebarPanel('search');
  setTimeout(() => document.getElementById('search-query-input').focus(), 100);
}

// ─── Initialization ──────────────────────────────────────
if (document.readyState === 'loading') {
  window.addEventListener('DOMContentLoaded', initVFSCache);
} else {
  initVFSCache();
}
</script>

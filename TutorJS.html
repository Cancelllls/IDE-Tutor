      "name": "Renting Your First Safety Deposit Box",
      "content": "<h3>The Architecture of Memory</h3><p>In the world of high finance, a bank is only as good as its vault. Imagine the computer's <b>RAM (Random Access Memory)</b> as the massive floor space of a high-security vault. When you write code, you are effectively renting space on that floor.</p><h3>The Variable: A Labeled Box</h3><p>A <b>Variable</b> is like a safety deposit box. You don't just throw your money (data) onto the floor; you put it in a box and put a <b>label</b> on it so you can find it later. Without a label, the security guards (the JavaScript Engine) wouldn't know which pile of data belongs to you.</p><ul><li><b>let:</b> This keyword tells the bank, 'I want to rent a box, and I might come back later to swap what is inside.'</li><li><b>Assignment (=):</b> The equals sign is the act of physically placing the asset into the box.</li></ul><p><b>Why does this matter?</b> Because memory allocation is expensive. By naming your variables clearly, you are creating a map of your vault, making your 'bank' (program) efficient and organized.</p><div class='challenge-box'><b>Challenge:</b> Rent a box by declaring a variable named <code>accountBalance</code> and place the number <code>5000</code> inside it.</div>",

      "content": "<h3>Asset Unpacking</h3><p>When a customer hands over a complex <b>Account Object</b>, we don't always need everything. <b>Destructuring</b> allows us to 'unpack' specific pieces of data (like the account number and balance) directly into variables.</p><p>Instead of writing <code>const bal = account.balance</code> repeatedly, we use curly braces to 'pluck' the properties we want. This makes our code cleaner and prevents us from carrying around 'heavy' objects we don't fully need.</p><ul><li><b>Object Destructuring:</b> <code>const { balance, id } = account;</code></li><li><b>Array Destructuring:</b> <code>const [first, second] = transactions;</code></li></ul><div class='challenge-box'><b>Challenge:</b> Destructure the <code>name</code> and <code>type</code> from this object: <code>{ name: 'Savings', type: 'Personal', id: 99 }</code>.</div>",

    "lessons": [{
      "name": "The End-of-Day Reconciliation",
      "content": "<h3>The Milestone: Transaction Engine</h3><p>Welcome to the final stage of your banking core training. You are now tasked with building a <b>Batch Processing Engine</b>. This engine will take an array of raw transaction objects, filter out the invalid ones, transform them into a standardized format, and calculate the final branch balance.</p><p>This milestone combines everything: <b>Functions</b> for logic, <b>Arrow Functions</b> for speed, <b>Array Methods</b> for processing, and <b>Destructuring</b> for data handling. You are no longer just a teller; you are the System Architect.</p><div class='challenge-box'><b>Challenge:</b> Create a function <code>runReconciliation</code> that takes an array of objects like <code>{ amt: 100, status: 'valid' }</code>. 1. Filter for 'valid' status. 2. Map to extract just the 'amt'. 3. Reduce to find the total sum.</div>",
      "hint": "Chain your methods: .filter(...).map(...).reduce(...)",
      "solution": "const runReconciliation = (txs) => txs.filter(t => t.status === 'valid').map(t => t.amt).reduce((a, b) => a + b, 0);"
    }]
  },
  {
    "title": "Module 21: Object Prototypes & Inheritance (The Shared Blueprint)",
    "lessons": [{
      "name": "The Master Blueprint in the Basement",
      "content": "<h3>The Efficiency of the Shared Blueprint</h3><p>Imagine a bank with millions of accounts. If every single account carried its own physical rulebook for 'How to Calculate Interest,' the bank's vault (Memory) would be overflowing with redundant paper. Instead, JavaScript uses <b>Prototypes</b>.</p><p>Think of the Prototype as a <b>Shared Blueprint</b> kept in the basement. Every account 'references' this blueprint. When you ask an account to calculate interest, and it doesn't know how, it looks 'up the chain' to the shared blueprint.</p><ul><li><b>__proto__:</b> The invisible umbilical cord connecting an object to its blueprint.</li><li><b>Object.create():</b> Creating a new asset specifically linked to a master blueprint.</li></ul><div class='challenge-box'><b>Challenge:</b> Create a master blueprint called <code>accountTemplate</code> with a property <code>bankName</code> set to \"Global Reserve\". Then, create <code>myAccount</code> using <code>Object.create()</code>.</div>",
      "hint": "Use Object.create(accountTemplate);",
      "solution": "const accountTemplate = { bankName: \"Global Reserve\" }; const myAccount = Object.create(accountTemplate);"
    }]
  },
  {
    "title": "Module 22: Classes & Constructors (The Modern Blueprint)",
    "lessons": [{
      "name": "The Prefabricated Construction Crew",
      "content": "<h3>The Evolution of Architecture</h3><p>In modern banking software, we don't just copy objects; we use <b>Classes</b>. A Class is an architectural drawing. It isn't a building yet; it is the <i>plan</i> for the building.</p><p>The <b>Constructor</b> is the construction crew. When you call <code>new Account()</code>, the constructor runs immediately, laying the foundation and setting the initial balance.</p><ul><li><b>class:</b> The declaration of the blueprint.</li><li><b>this:</b> A reference to the specific building being constructed right now.</li></ul><div class='challenge-box'><b>Challenge:</b> Create a class <code>Account</code> with a constructor that takes <code>initialBalance</code> and assigns it to <code>this.balance</code>.</div>",
      "hint": "class Name { constructor(param) { this.x = param; } }",
      "solution": "class Account { constructor(initialBalance) { this.balance = initialBalance; } }"
    }]
  },
  {
    "title": "Module 23: Static Methods & Private Fields (The Executive Suite)",
    "lessons": [{
      "name": "The Vault-Within-a-Vault",
      "content": "<h3>Securing the Executive Suite</h3><p>Some data is too sensitive for the general public. We use <b>Private Fields</b> (prefixed with <code>#</code>) to create a vault-within-a-vault. These fields cannot be touched from outside the class—not even by the customer!</p><p><b>Static Methods</b> are like the bank's global policies. They don't belong to one specific account; they belong to the Bank itself (the Class). For example, a method to check the current global exchange rate.</p><ul><li><b>#privateField:</b> Security Seals that only internal methods can break.</li><li><b>static:</b> Tools owned by the Institution, not the individual.</li></ul><div class='challenge-box'><b>Challenge:</b> In a class <code>Vault</code>, create a private field <code>#pin</code> and a static method <code>identify()</code> that returns \"Security System v1.0\".</div>",
      "hint": "Use # before the variable name and the static keyword for methods.",
      "solution": "class Vault { #pin; static identify() { return \"Security System v1.0\"; } }"
    }]
  },
  {
    "title": "Module 24: Error Handling (The Safety Net: Try/Catch)",
    "lessons": [{
      "name": "The Fire Suppression System",
      "content": "<h3>Surviving the Crash</h3><p>In high-frequency trading, a single error can crash the entire system. <b>Try/Catch</b> is your bank's fire suppression system. We 'try' to execute a transaction, but if it 'throws' a spark (an error), we 'catch' it and handle it gracefully instead of letting the building burn down.</p><ul><li><b>try:</b> Attempting a risky operation (like connecting to a remote vault).</li><li><b>catch:</b> The emergency procedure that runs if the operation fails.</li></ul><div class='challenge-box'><b>Challenge:</b> Wrap a <code>console.log(nonExistentVar)</code> in a <code>try/catch</code> block. In the catch block, log \"Error Intercepted\".</div>",
      "hint": "try { ... } catch (err) { ... }",
      "solution": "try { console.log(nonExistentVar); } catch (err) { console.log(\"Error Intercepted\"); }"
    }]
  },
  {
    "title": "Module 25: Custom Errors & Validation (Audit Rules: Throwing)",
    "lessons": [{
      "name": "The Whistle-Blower",
      "content": "<h3>Blowing the Whistle</h3><p>Sometimes the code is technically 'correct' but financially 'illegal.' If a user tries to withdraw more money than they have, JavaScript won't stop them automatically. We must <b>throw</b> our own errors—acting as the bank's Internal Audit.</p><p>When we <code>throw</code>, we are raising a red flag that stops the assembly line immediately.</p><div class='challenge-box'><b>Challenge:</b> Create a function <code>validateWithdrawal</code> that takes <code>amt</code>. If <code>amt > 1000</code>, <code>throw</code> a new <code>Error</code> saying \"Limit Exceeded\".</div>",
      "hint": "throw new Error(\"message\");",
      "solution": "function validateWithdrawal(amt) { if (amt > 1000) { throw new Error(\"Limit Exceeded\"); } }"
    }]
  },
  {
    "title": "Module 26: Maps & Sets (Modern Asset Collections)",
    "lessons": [{
      "name": "The High-Speed Filing Cabinet",
      "content": "<h3>Optimized Record Keeping</h3><p>Standard objects are like messy desks. <b>Maps</b> are high-speed industrial filing cabinets. They are better for banking because they remember the order of entries and allow any data type (even objects!) to be used as a key.</p><p><b>Sets</b> are unique vault keys. A Set automatically rejects duplicates, making it perfect for storing a list of unique Customer IDs.</p><ul><li><b>Map:</b> Key-Value pairs with better performance.</li><li><b>Set:</b> A collection of strictly unique items.</li></ul><div class='challenge-box'><b>Challenge:</b> Create a <code>Map</code> called <code>ledger</code> and <code>set</code> a key of \"A1\" to the value 500. Then create a <code>Set</code> of <code>uniqueIds</code> and <code>add</code> \"ID_1\".</div>",
      "hint": "new Map() and new Set()",
      "solution": "const ledger = new Map(); ledger.set(\"A1\", 500); const uniqueIds = new Set(); uniqueIds.add(\"ID_1\");"
    }]
  },
  {
    "title": "Module 27: Symbols (Secret Handshakes: Unique IDs)",
    "lessons": [{
      "name": "The Invisible Ink",
      "content": "<h3>The Secret Handshake</h3><p><b>Symbols</b> are the ultimate security tool. Every Symbol is guaranteed to be 100% unique, even if they have the same description. In banking, we use them as 'Hidden Keys' on objects that other developers or external APIs cannot accidentally overwrite.</p><p>It's like writing a serial number in <b>Invisible Ink</b>; only those who know where to look can see it.</p><div class='challenge-box'><b>Challenge:</b> Create a Symbol called <code>SECRET_KEY</code> and use it as a property key on an object <code>vault</code> with the value \"Unlocked\".</div>",
      "hint": "const sym = Symbol('desc'); obj[sym] = 'val';",
      "solution": "const SECRET_KEY = Symbol(\"auth\"); const vault = { [SECRET_KEY]: \"Unlocked\" };"
    }]
  },
  {
    "title": "Module 28: Iterators & Generators (The Ledger Stream)",
    "lessons": [{
      "name": "The Infinite Ledger Conveyor Belt",
      "content": "<h3>Streaming the Data</h3><p>Imagine a ledger with 10 billion transactions. You cannot load them all into memory at once. <b>Generators</b> (the <code>function*</code>) allow us to process transactions one by one, like a conveyor belt.</p><p>The <code>yield</code> keyword pauses the teller, hands you one transaction, and waits for you to ask for the next one. This is <b>Lazy Evaluation</b>—the pinnacle of memory efficiency.</p><div class='challenge-box'><b>Challenge:</b> Create a generator function <code>transactionStream</code> that <code>yield</code>s 100 then 200.</div>",
      "hint": "function* name() { yield x; }",
      "solution": "function* transactionStream() { yield 100; yield 200; }"
    }]
  },
  {
    "title": "Module 29: Regular Expressions (Identity Pattern Scanning)",
    "lessons": [{
      "name": "The Digital Fingerprint Scanner",
      "content": "<h3>Pattern Recognition</h3><p><b>Regular Expressions (Regex)</b> are the digital fingerprint scanners of the bank. Instead of checking if a string is exactly equal to another, we check if it <i>matches a pattern</i>. Is it a valid email? Does it look like a credit card number?</p><p>We use patterns like <code>/\\d/</code> (match a digit) to scan through thousands of documents in milliseconds.</p><div class='challenge-box'><b>Challenge:</b> Create a regex <code>accountRegex</code> that checks if a string contains exactly 5 digits. Use <code>^</code> and <code>$</code>.</div>",
      "hint": "/^\\d{5}$/",
      "solution": "const accountRegex = /^\\d{5}$/;"
    }]
  },
  {
    "title": "Module 30: [MILESTONE] Identity System (Verification Milestone)",
    "lessons": [{
      "name": "The Grand Architect's Challenge",
      "content": "<h3>Milestone 3: The Identity Firewall</h3><p>It is time to combine your architectural knowledge. You are tasked with building the bank's <b>Identity Verification System</b>. It must use Classes for structure, Private Fields for security, and Regex for pattern matching.</p><div class='challenge-box'><b>Challenge:</b> Create a class <code>Validator</code> with a private field <code>#pattern = /^ID-\\d{3}$/</code>. Add a method <code>check(val)</code> that returns true if <code>val</code> matches the private pattern.</div>",
      "hint": "Use this.#pattern.test(val) inside the method.",
      "solution": "class Validator { #pattern = /^ID-\\d{3}$/; check(val) { return this.#pattern.test(val); } }"
    }]
  },
  {
    "title": "Module 31: The Event Loop & Concurrency (The Service Queue)",
    "lessons": [{
      "name": "The Single-Teller Bottleneck",
      "content": "<h3>The Service Queue Architecture</h3><p>JavaScript is a <b>single-threaded</b> language, meaning it has only one <b>Call Stack</b>. Imagine a bank with only <b>one teller</b>. If a customer demands a complex audit that takes 10 minutes, the entire line stops. This is 'blocking' the main thread.</p><h3>The Waiting Room (Task Queue)</h3><p>To prevent freezing, the bank uses a <b>Waiting Room</b>. When a long task (like a network request) starts, the teller hands it off to a specialized department (Web APIs) and immediately services the next customer. When the long task is finished, it doesn't just cut in line; it enters the <b>Callback Queue</b>. The <b>Event Loop</b> is the manager who waits until the teller is free before allowing the next finished task to return to the window.</p><ul><li><b>Call Stack:</b> The teller's current task.</li><li><b>Task Queue:</b> The line of finished 'waiting room' tasks.</li><li><b>Event Loop:</b> The mechanism that moves tasks from the queue to the stack.</li></ul><div class='challenge-box'><b>Challenge:</b> Use <code>setTimeout</code> to simulate a background task that logs \"Audit Finished\" after 1000ms without blocking the immediate log of \"Serving Next Customer\".</div>",
      "hint": "setTimeout(() => { ... }, ms);",
      "solution": "setTimeout(() => console.log(\"Audit Finished\"), 1000); console.log(\"Serving Next Customer\");"
    }]
  },
  {
    "title": "Module 32: Callbacks & Promises (The Future Contract)",
    "lessons": [{
      "name": "The Future Value Receipt",
      "content": "<h3>The Future Contract</h3><p>A <b>Promise</b> is like a high-security receipt given to a customer. It says: 'I don't have your funds yet, but I <b>promise</b> to give them to you (Resolve) or tell you why I couldn't (Reject).'</p><h3>States of a Contract</h3><p>A Promise exists in one of three states:</p><ul><li><b>Pending:</b> The transaction is still being processed.</li><li><b>Fulfilled:</b> The money has arrived (then()).</li><li><b>Rejected:</b> The transaction failed (catch()).</li></ul><div class='challenge-box'><b>Challenge:</b> Create a <code>new Promise</code> that resolves with the string \"Funds Approved\" after a short delay.</div>",
      "hint": "new Promise((resolve) => resolve(value));",
      "solution": "const p = new Promise((resolve) => { setTimeout(() => resolve(\"Funds Approved\"), 500); });"
    }]
  },
  {
    "title": "Module 33: Async / Await Pattern (The Synchronous Appearance)",
    "lessons": [{
      "name": "The Streamlined Wire Transfer",
      "content": "<h3>Synchronous Appearance</h3><p>While Promises are powerful, 'Callback Hell' makes the ledger messy. <b>Async/Await</b> is syntactic sugar that makes asynchronous code look like a clean, top-to-bottom procedure. It's like a teller who 'pauses' their own timeline to wait for a <b>Wire Transfer</b> to clear, without stopping the rest of the bank.</p><h3>The Rules of Engagement</h3><ul><li><b>async:</b> Marks a function as returning a Promise.</li><li><b>await:</b> Pauses execution until the Promise settles.</li></ul><div class='challenge-box'><b>Challenge:</b> Write an <code>async</code> function <code>processTransfer</code> that <code>await</code>s a promise resolving to 500 and then logs it.</div>",
      "hint": "async function name() { const result = await promise; }",
      "solution": "async function processTransfer() { const amt = await Promise.resolve(500); console.log(amt); }"
    }]
  },
  {
    "title": "Module 34: Promise APIs (Parallel Branches: All/Race/Settled)",
    "lessons": [{
      "name": "Coordinating Multiple Branches",
      "content": "<h3>The Global Reconciliation</h3><p>Often, a bank needs to check multiple branches simultaneously. We use <b>Promise APIs</b> to manage these parallel requests.</p><ul><li><b>Promise.all():</b> Waits for <b>all</b> branches to confirm. If even one fails, the whole operation fails.</li><li><b>Promise.race():</b> Returns the result of the <b>fastest</b> branch to respond.</li><li><b>Promise.allSettled():</b> Waits for all branches to finish, regardless of success or failure.</li></ul><div class='challenge-box'><b>Challenge:</b> Use <code>Promise.all</code> to wait for two promises: one resolving to \"Vault A\" and one to \"Vault B\".</div>",
      "hint": "Promise.all([p1, p2]).then(results => ...);",
      "solution": "Promise.all([Promise.resolve(\"Vault A\"), Promise.resolve(\"Vault B\")]).then(console.log);"
    }]
  },
  {
    "title": "Module 35: Mocking Network Requests (The Test Branch: Fetch Simulation)",
    "lessons": [{
      "name": "Simulating the Mainframe",
      "content": "<h3>The Test Branch Architecture</h3><p>In development, we don't want to hit the real production mainframe. We create <b>Mock Requests</b>. This involves simulating network latency and data responses using <code>setTimeout</code> and Promises.</p><p><b>The Why:</b> It allows you to build the UI and logic of the Banking Terminal even when the server is offline.</p><div class='challenge-box'><b>Challenge:</b> Create a function <code>fetchBalance</code> that returns a promise which resolves to <code>{bal: 1000}</code> after 200ms.</div>",
      "hint": "return new Promise(res => setTimeout(() => res(data), 200));",
      "solution": "const fetchBalance = () => new Promise(res => setTimeout(() => res({bal: 1000}), 200));"
    }]
  },
  {
    "title": "Module 36: Dates & Locales (Interest Timing: Formatting Currency)",
    "lessons": [{
      "name": "International Currency Standards",
      "content": "<h3>The Globalization Department</h3><p>A global bank must display money correctly for every region. $1,000.00 in the US is 1.000,00 € in Germany. We use the <b>Intl (Internationalization)</b> API.</p><ul><li><b>Intl.NumberFormat:</b> Formats digits into currency.</li><li><b>Intl.DateTimeFormat:</b> Formats timestamps into local dates.</li></ul><div class='challenge-box'><b>Challenge:</b> Format the number <code>50000</code> as US Dollars ($50,000.00) using <code>Intl.NumberFormat</code>.</div>",
      "hint": "new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);",
      "solution": "const formatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }); console.log(formatter.format(50000));"
    }]
  },
  {
    "title": "Module 37: Proxy & Reflect (The Security Proxy: Interception)",
    "lessons": [{
      "name": "The Armed Guard Interceptor",
      "content": "<h3>The Security Proxy</h3><p>A <b>Proxy</b> is a security guard standing in front of an object. Every time you try to read a property (get) or change one (set), the guard intercepts the request. <b>Reflect</b> is the official tool the guard uses to actually perform the action after validation.</p><p><b>The Analogy:</b> You don't just walk into the vault; you give your request to the guard. If the request is valid, the guard gets the item for you.</p><div class='challenge-box'><b>Challenge:</b> Create a Proxy for <code>{balance: 100}</code> that prevents setting the balance to a negative number.</div>",
      "hint": "new Proxy(target, { set(t, p, v) { ... } });",
      "solution": "const account = { balance: 100 }; const guard = new Proxy(account, { set(t, p, v) { if (p === 'balance' && v < 0) throw new Error('Debt Forbidden'); t[p] = v; return true; } });"
    }]
  },
  {
    "title": "Module 38: Bitwise Operators (Binary Security: Lower Level Logic)",
    "lessons": [{
      "name": "The Binary Permission Mask",
      "content": "<h3>Lower-Level Security</h3><p>At the deepest level, bank permissions are stored as bits (0s and 1s). <b>Bitwise Operators</b> allow us to check multiple permissions (Read, Write, Execute) in a single number using 'masks'.</p><ul><li><b>AND (&):</b> Checks if a bit is set.</li><li><b>OR (|):</b> Sets a bit.</li><li><b>XOR (^):</b> Flips a bit.</li></ul><div class='challenge-box'><b>Challenge:</b> Define <code>READ = 1</code> and <code>WRITE = 2</code>. Use <code>|</code> to create a <code>userPerms</code> variable with both.</div>",
      "hint": "let perms = READ | WRITE;",
      "solution": "const READ = 1; const WRITE = 2; let userPerms = READ | WRITE;"
    }]
  },
  {
    "title": "Module 39: Performance & Memory (The Lean Ledger: Avoiding Leaks)",
    "lessons": [{
      "name": "The Lean Ledger Strategy",
      "content": "<h3>Memory Leak Prevention</h3><p>A bank terminal that crashes after 100 transactions is a failure. <b>Memory Leaks</b> happen when we keep references to objects the bank no longer needs. The <b>Garbage Collector</b> is the janitor who clears out unused objects.</p><h3>Specialized Storage</h3><ul><li><b>WeakMap:</b> A map where keys are 'weakly held'. If no other reference to the key exists, the janitor can delete the entry automatically.</li></ul><div class='challenge-box'><b>Challenge:</b> Use a <code>WeakMap</code> to store a private 'security token' for an <code>account</code> object.</div>",
      "hint": "const wm = new WeakMap(); wm.set(obj, val);",
      "solution": "const wm = new WeakMap(); const account = {}; wm.set(account, \"SECURE_TOKEN_123\");"
    }]
  },
  {
    "title": "Module 40: [FINAL PROJECT] Global Terminal (The Graduation Project)",
    "lessons": [{
      "name": "Architecting the Global Terminal",
      "content": "<h3>The Graduation Project</h3><p>You are now the Chief Architect. Your task is to build the <b>GlobalTerminal</b> class that integrates everything you've learned. It must handle async transactions, secure data with Proxies, format currency locally, and manage memory efficiently.</p><h3>Requirements:</h3><ul><li><b>Security:</b> Use a Proxy to protect account data.</li><li><b>Asynchrony:</b> Use async/await for simulated network transfers.</li><li><b>Localization:</b> Use Intl for receipts.</li><li><b>Architecture:</b> Use a Map to store accounts by ID.</li></ul><div class='challenge-box'><b>Challenge:</b> Implement a <code>GlobalTerminal</code> that has a <code>transfer</code> method and a secure <code>accounts</code> storage.</div>",
      "hint": "Combine class, Proxy, and async/await.",
      "solution": "class GlobalTerminal { constructor() { this.store = new Map(); this.formatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }); } createAccount(id, initial) { const acc = { id, balance: initial }; this.store.set(id, new Proxy(acc, { set(t, p, v) { if (p === 'balance' && v < 0) return false; t[p] = v; return true; } })); } async transfer(fromId, toId, amt) { await new Promise(r => setTimeout(r, 100)); const a = this.store.get(fromId), b = this.store.get(toId); if (a && b && a.balance >= amt) { a.balance -= amt; b.balance += amt; return `Transferred ${this.formatter.format(amt)}`; } throw new Error('Failed'); } }"
    }]
  }
];

function runLinter() {
    const text = editor.value; lintProblems = []; const stack = []; const lines = text.split('\n');
    for (let r = 0; r < lines.length; r++) {
        const line = lines[r];
        for (let c = 0; c < line.length; c++) {
            const ch = line[c];
            if ('{(['.includes(ch)) stack.push({ char: ch, line: r + 1 });
            else if ('})]'.includes(ch)) {
                const expected = { '{': '}', '(': ')', '[': ']' }[stack.length > 0 ? stack[stack.length-1].char : ''];
                if (stack.length === 0 || ch !== expected) { lintProblems.push({ line: r + 1, severity: 'error' }); if (stack.length > 0) stack.pop(); }
                else stack.pop();
            }
        }
    }
    stack.forEach(s => lintProblems.push({ line: s.line, severity: 'error' }));
}

function highlightCode(markerIndex = -1) {
    const text = editor.value; const tokens = [];
    for (let [type, regex] of Object.entries(tokenizerRules)) {
        let r = new RegExp(regex.source, 'g'); let m;
        while ((m = r.exec(text)) !== null) { tokens.push({ start: m.index, end: r.lastIndex, type }); if (m.index === r.lastIndex) r.lastIndex++; }
    }
    tokens.sort((a, b) => a.start - b.start);
    const kept = []; let lastEnd = 0;
    for (let t of tokens) { if (t.start >= lastEnd) { kept.push(t); lastEnd = t.end; } }
    let html = ""; let currentIndex = 0;
    const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    function renderRange(start, end) {
        let sub = text.substring(start, end);
        if (markerIndex >= start && markerIndex <= end) {
            let rel = markerIndex - start;
            return escape(sub.substring(0, rel)) + '<span id="intellisense-marker"></span>' + escape(sub.substring(rel));
        }
        return escape(sub);
    }
    for (let t of kept) {
        if (t.start > currentIndex) html += renderRange(currentIndex, t.start);
        html += `<span class="token-${t.type}">${escape(text.substring(t.start, t.end))}</span>`;
        currentIndex = t.end;
    }
    if (currentIndex < text.length) html += renderRange(currentIndex, text.length);
    if (markerIndex === text.length) html += '<span id="intellisense-marker"></span>';
    const htmlLines = html.split('\n'); let finalHtml = "";
    htmlLines.forEach((line, idx) => {
        const lineNum = idx + 1; const hasError = lintProblems.some(p => p.line === lineNum);
        const content = hasError ? `<span class="error-squiggle">${line || ' '}</span>` : (line || ' ');
        finalHtml += `<div class="${hasError ? 'line-error' : ''}">${content}</div>`;
    });
    codeHighlighted.innerHTML = finalHtml + "\n ";
    updateGutter();
}

function updateGutter() {
    const lines = editor.value.split('\n').length; let gutterHtml = "";
    for (let i = 1; i <= lines; i++) {
        const hasError = lintProblems.some(p => p.line === i);
        gutterHtml += `<div class="${hasError ? 'gutter-error' : ''}">${i}</div>`;
    }
    lineNums.innerHTML = gutterHtml;
}

function syncEditor() { runLinter(); highlightCode(); triggerIntelliSense(); }

function triggerIntelliSense() {
    const textBefore = editor.value.substring(0, editor.selectionStart);
    const lastWord = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
    const prefix = lastWord ? lastWord[0] : "";
    if (prefix.length < 1) { hideSuggestions(); return; }
    const matches = IntelliSenseDb.filter(item => item.name.toLowerCase().includes(prefix.toLowerCase()));
    if (matches.length > 0) {
        activeSuggestions = matches.slice(0, 10); selectedSuggestionIdx = 0;
        renderSuggestions(); positionSuggestions();
    } else hideSuggestions();
}

function renderSuggestions() {
    suggestionsList.innerHTML = "";
    activeSuggestions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = `suggestion-item ${idx === selectedSuggestionIdx ? 'selected' : ''}`;
        div.innerHTML = `<span class="suggestion-icon icon-${item.type}">${item.type}</span><span>${item.name}</span>`;
        div.onclick = () => insertSuggestion(item);
        suggestionsList.appendChild(div);
    });
    suggestionsDoc.innerText = activeSuggestions[selectedSuggestionIdx].desc;
    suggestionsMenu.style.display = 'flex'; suggestionsVisible = true;
}

function positionSuggestions() {
    highlightCode(editor.selectionStart);
    const marker = document.getElementById('intellisense-marker');
    if (marker) {
        const rect = marker.getBoundingClientRect(); const wrap = document.getElementById('editor-container').getBoundingClientRect();
        suggestionsMenu.style.top = `${rect.bottom - wrap.top + 5}px`; suggestionsMenu.style.left = `${rect.left - wrap.left}px`;
    }
}

function insertSuggestion(item) {
    const textBefore = editor.value.substring(0, editor.selectionStart);
    const lastWord = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
    const prefix = lastWord ? lastWord[0] : "";
    const start = editor.selectionStart - prefix.length; const end = editor.selectionStart;
    editor.value = editor.value.substring(0, start) + item.name + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + item.name.length;
    hideSuggestions(); syncEditor(); editor.focus();
}

function hideSuggestions() { suggestionsMenu.style.display = 'none'; suggestionsVisible = false; }

function saveProgress(mIdx) {
    if (!completedModules.includes(mIdx)) {
        completedModules.push(mIdx);
        localStorage.setItem('academy_progress', JSON.stringify(completedModules));
        renderSidebar();
    }
}

function renderSidebar() {
    const list = document.getElementById('curriculum-list'); if (!list) return; list.innerHTML = '';
    courseData.forEach((mod, mIdx) => {
        if (mIdx % 10 === 0) {
            const h = document.createElement('div'); h.className = 'sidebar-header';
            h.innerText = pathways[Math.floor(mIdx/10)] || "ADVANCED"; list.appendChild(h);
        }
        const isCompleted = completedModules.includes(mIdx);
        const group = document.createElement('div'); group.className = 'module-group';
        group.innerHTML = `<div class="module-title" style="cursor:pointer;" onclick="loadLesson(${mIdx}, 0)">${isCompleted ? '✅ ' : ''}${mod.title}</div>`;
        mod.lessons.forEach((lesson, lIdx) => {
            const link = document.createElement('div');
            link.className = `lesson-link ${currentMIdx === mIdx && currentLIdx === lIdx ? 'active' : ''}`;
            link.innerText = lesson.name;
            link.onclick = (e) => { e.stopPropagation(); loadLesson(mIdx, lIdx); };
            group.appendChild(link);
        });
        list.appendChild(group);
    });
}

function loadLesson(mIdx, lIdx) {
    currentMIdx = mIdx; currentLIdx = lIdx;
    const lesson = courseData[mIdx].lessons[lIdx];
    document.getElementById('lesson-content').innerHTML = `<div class="module-tag">${courseData[mIdx].title.toUpperCase()}</div><h2>${lesson.name}</h2>${lesson.content}`;
    document.getElementById('hint-content').innerText = lesson.hint;
    document.getElementById('solution-content').innerText = lesson.solution;
    document.getElementById('hint-content').style.display = 'none';
    document.getElementById('solution-content').style.display = 'none';
    document.getElementById('tool-section').style.display = 'block';
    document.getElementById('teacher-feedback').innerText = `Focus on ${lesson.name}. Think like a developer.`;
    syncEditor(); renderSidebar();
}

const appendToTerminal = (args, type) => {
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const message = Array.from(args).map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
    entry.innerHTML = `<span style="color: #888; font-size: 10px;">[${timestamp}]</span> <span style="margin-left:5px;">${message}</span>`;
    logContainer.appendChild(entry);
    logContainer.scrollTop = logContainer.scrollHeight;
};

const customConsole = { log: (...a) => appendToTerminal(a, 'info'), error: (...a) => appendToTerminal(a, 'error'), warn: (...a) => appendToTerminal(a, 'warn') };
const customPrompt = (m) => { const v = window.prompt(m); appendToTerminal([`[INPUT]: ${v}`], 'warn'); return v; };

window.runEditorCode = () => {
    logContainer.innerHTML = '<div style="color: #007acc; font-size: 11px; margin-bottom: 10px;">-- Transaction Initiated --</div>';
    const userCode = editor.value;
    if (userCode.trim().length < 2) {
        document.getElementById('teacher-feedback').innerHTML = "<span style='color: #f44336;'>The editor is empty. Add logic to proceed.</span>"; return;
    }
    try {
        const executor = new Function('console', 'prompt', `"use strict";\n${userCode}`);
        executor(customConsole, customPrompt);
        const normalize = (s) => s.replace(/\/\/.*|\/\*[\s\S]*?\*\/|[\s;]/g, "").toLowerCase().trim();
        const normUser = normalize(userCode), normSol = normalize(courseData[currentMIdx].lessons[currentLIdx].solution);
        if (normUser.includes(normSol) || normSol.includes(normUser)) {
            document.getElementById('teacher-feedback').innerHTML = "<span style='color: #4ec9b0;'>Excellent! Verification successful. ✅</span>"; saveProgress(currentMIdx);
        } else {
            document.getElementById('teacher-feedback').innerHTML = "<span style='color: #ff9800;'>Execution complete. Logic check failed. Review your code.</span>";
        }
    } catch (e) { appendToTerminal([e.message], 'error'); document.getElementById('teacher-feedback').innerHTML = `<span style='color: #f44336;'>Runtime Exception: ${e.message}</span>`; }
};

window.toggleTool = (t) => { const el = document.getElementById(`${t}-content`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; };

window.onload = () => {
    renderSidebar();
    editor.addEventListener('input', syncEditor);
    editor.addEventListener('scroll', () => { 
        codeHighlighted.scrollTop = editor.scrollTop; 
        codeHighlighted.scrollLeft = editor.scrollLeft; 
        lineNums.scrollTop = editor.scrollTop; 
    });
    editor.addEventListener('keydown', function(e) {
        if (suggestionsVisible && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
            e.preventDefault(); if (e.key === 'ArrowDown') selectedSuggestionIdx = (selectedSuggestionIdx + 1) % activeSuggestions.length;
            else selectedSuggestionIdx = (selectedSuggestionIdx - 1 + activeSuggestions.length) % activeSuggestions.length;
            renderSuggestions(); return;
        }
        if (suggestionsVisible && (e.key === 'Enter' || e.key === 'Tab')) { e.preventDefault(); insertSuggestion(activeSuggestions[selectedSuggestionIdx]); return; }
        if (e.key === 'Escape') { hideSuggestions(); return; }
        if (e.key === 'Tab') {
            e.preventDefault(); const s = this.selectionStart, end = this.selectionEnd;
            this.value = this.value.substring(0, s) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = s + 4; syncEditor();
        }
    });
    console.log("JS Academy Ready. v2.1.0");
};
</script>

<script>
/**
 * Tutor Engine v3.0.0 — Professional Multi-Language Integration
 * Powered by IDE Tutor Execution Core.
 */

// --- STATE MANAGEMENT ---
let currentMIdx = 0;
let currentLIdx = 0;
let completedModules = JSON.parse(localStorage.getItem('academy_progress') || '[]');
let activeLanguage = 'javascript';
let tabSize = 4;
let suggestionsVisible = false;
let activeSuggestions = [];
let selectedSuggestionIdx = 0;
let lintProblems = [];

const editor = document.getElementById('code-editor');
const codeHighlighted = document.getElementById('code-highlighted');
const lineNums = document.getElementById('line-numbers');
const suggestionsMenu = document.getElementById('suggestions-menu');
const suggestionsList = document.getElementById('suggestions-list');
const suggestionsDoc = document.getElementById('suggestions-doc');
const logContainer = document.getElementById('log-container');

// --- TOKENIZER RULES (IDE CORE) ---
const tokenizerRules = {
  javascript: {
    comment: /\/\/.*|\/\*[\s\S]*?\*\//,
    string: /"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`/,
    number: /\b0x[a-fA-F0-9]+\b|\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b/,
    keyword: /\b(let|const|var|function|return|if|else|for|while|do|switch|case|default|break|continue|try|catch|finally|throw|new|this|class|extends|import|export|from|typeof|instanceof|in|of|async|await|yield|true|false|null|undefined|void|delete|super|with|debugger|static|get|set)\b/,
    builtin: /\b(console|document|window|Math|JSON|Array|Object|String|Number|Boolean|Map|Set|Promise|RegExp|Date|Error|Symbol|parseInt|parseFloat|isNaN|isFinite|encodeURI|decodeURI|setTimeout|setInterval|fetch|require)\b/,
    function: /\b([a-zA-Z_$]\w*)\s*(?=\()/,
    operator: /[-+*/%=!&|^<>~?:]+|\.{3}/,
    punctuation: /[{}()\[\],;.]/
  },
  python: {
    comment: /#.*/,
    string: /"""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/,
    number: /\b\d+(?:\.\d+)?\b/,
    keyword: /\b(def|return|if|elif|else|for|while|break|continue|pass|import|from|as|in|is|and|or|not|try|except|finally|raise|assert|class|with|lambda|global|nonlocal|True|False|None|yield|async|await)\b/,
    builtin: /\b(print|input|len|range|int|float|str|list|dict|tuple|set|bool|type|isinstance|hasattr|getattr|setattr|map|filter|zip|enumerate|sorted|reversed|min|max|sum|abs|round|open|super|property|staticmethod|classmethod)\b/,
    decorator: /@\w+/,
    function: /\b([a-zA-Z_]\w*)\s*(?=\()/,
    operator: /[-+*/%=!&|^<>~?:]/,
    punctuation: /[{}()\[\],;.]/
  },
  cpp: {
    comment: /\/\/.*|\/\*[\s\S]*?\*\//,
    string: /"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/,
    number: /\b\d+(?:\.\d+)?\b/,
    keyword: /\b(auto|break|case|catch|char|class|const|constexpr|continue|default|delete|do|double|else|enum|explicit|export|extern|false|float|for|friend|goto|if|inline|int|long|mutable|namespace|new|noexcept|nullptr|operator|override|private|protected|public|register|return|short|signed|sizeof|static|static_cast|struct|switch|template|this|throw|true|try|typedef|typeid|typename|union|unsigned|using|virtual|void|volatile|wchar_t|while)\b/,
    builtin: /\b(std|cout|cin|endl|cerr|string|vector|map|set|pair|queue|stack|deque|array|bitset|list|unordered_map|unordered_set|unique_ptr|shared_ptr|make_unique|make_shared|move|forward|swap|sort|find|begin|end|size|push_back|pop_back|emplace_back|insert|erase|clear|empty|front|back|at|reserve|resize|capacity)\b/,
    preprocessor: /#\s*(include|define|ifdef|ifndef|endif|if|elif|else|undef|pragma)\b.*|#include\s*<[^>]+>/,
    function: /\b([a-zA-Z_]\w*)\s*(?=\()/,
    operator: /[-+*/%=!&|^<>~?:]/,
    punctuation: /[{}()\[\],;.]/
  }
};

// --- CORE UTILITIES ---
// --- CORE UTILITIES ---
const escapeHtml = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function updateXP() {
  const xpCounter = document.getElementById('xp-counter');
  const xpBar = document.getElementById('xp-bar');
  if (!xpCounter || !xpBar) return;
  const currentXP = completedModules.length * 50;
  xpCounter.innerText = currentXP;
  const maxXP = courseData.length * 50;
  const percentage = (currentXP / maxXP) * 100;
  xpBar.style.width = `${percentage}%`;
}

function triggerConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#00e5ff', '#c678dd', '#98c379', '#f0f0f0'];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: canvas.width / 2, y: canvas.height / 2 + 100,
      vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 1) * 30 - 5,
      size: Math.random() * 8 + 4, color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 10
    });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.8; // gravity
      p.rotation += p.rotSpeed;
      if (p.y < canvas.height) active = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    });
    if (active) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

function runLinter() {
  const text = editor.value; lintProblems = []; const stack = []; const lines = text.split('\n');
  for (let r = 0; r < lines.length; r++) {
    const line = lines[r];
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if ('{(['.includes(ch)) stack.push({ char: ch, line: r + 1 });
      else if ('})]'.includes(ch)) {
        const expected = { '{': '}', '(': ')', '[': ']' }[stack.length > 0 ? stack[stack.length-1].char : ''];
        if (stack.length === 0 || ch !== expected) { lintProblems.push({ line: r + 1, severity: 'error' }); if (stack.length > 0) stack.pop(); }
        else stack.pop();
      }
    }
  }
  stack.forEach(s => lintProblems.push({ line: s.line, severity: 'error' }));
}

function highlightCode(markerIndex = -1) {
  const text = editor.value; 
  const rules = tokenizerRules[activeLanguage] || tokenizerRules.javascript;
  const tokens = [];
  for (let [type, regex] of Object.entries(rules)) {
    let r = new RegExp(regex.source, 'g'); let m;
    while ((m = r.exec(text)) !== null) { tokens.push({ start: m.index, end: r.lastIndex, type }); if (m.index === r.lastIndex) r.lastIndex++; }
  }
  tokens.sort((a, b) => a.start - b.start);
  const kept = []; let lastEnd = 0;
  for (let t of tokens) { if (t.start >= lastEnd) { kept.push(t); lastEnd = t.end; } }
  
  let html = ""; let currentIndex = 0;
  function renderRange(start, end) {
    let sub = text.substring(start, end);
    if (markerIndex >= start && markerIndex <= end) {
      let rel = markerIndex - start;
      return escapeHtml(sub.substring(0, rel)) + '<span id="intellisense-marker"></span>' + escapeHtml(sub.substring(rel));
    }
    return escapeHtml(sub);
  }
  for (let t of kept) {
    if (t.start > currentIndex) html += renderRange(currentIndex, t.start);
    html += `<span class="token-${t.type}">${escapeHtml(text.substring(t.start, t.end))}</span>`;
    currentIndex = t.end;
  }
  if (currentIndex < text.length) html += renderRange(currentIndex, text.length);
  if (markerIndex === text.length) html += '<span id="intellisense-marker"></span>';
  
  const htmlLines = html.split('\n'); let finalHtml = "";
  htmlLines.forEach((line, idx) => {
    const lineNum = idx + 1; const hasError = lintProblems.some(p => p.line === lineNum);
    finalHtml += `<div class="${hasError ? 'line-error' : ''}">${line || ' '}</div>`;
  });
  codeHighlighted.innerHTML = finalHtml + "\n ";
  updateGutter();
}

function updateGutter() {
  const lines = editor.value.split('\n').length; let gutterHtml = "";
  for (let i = 1; i <= lines; i++) {
    const hasError = lintProblems.some(p => p.line === i);
    gutterHtml += `<div class="${hasError ? 'gutter-error' : ''}">${i}</div>`;
  }
  lineNums.innerHTML = gutterHtml;
}

function syncEditor() { runLinter(); highlightCode(); triggerIntelliSense(); }

// --- INTELLISENSE ---
const IntelliSenseDb = {
  javascript: [
    { name: "let", type: "K", desc: "Declares a block-scoped variable." },
    { name: "const", type: "K", desc: "Declares a constant." },
    { name: "function", type: "K", desc: "Declares a function." },
    { name: "console.log", type: "M", desc: "Logs to the terminal." },
    { name: "return", type: "K", desc: "Returns from a function." }
  ],
  python: [
    { name: "print", type: "M", desc: "Python print function." },
    { name: "def", type: "K", desc: "Python function definition." }
  ]
};

function triggerIntelliSense() {
  const textBefore = editor.value.substring(0, editor.selectionStart);
  const lastWord = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
  const prefix = lastWord ? lastWord[0] : "";
  if (prefix.length < 1) { hideSuggestions(); return; }
  const matches = (IntelliSenseDb[activeLanguage] || []).filter(item => item.name.toLowerCase().startsWith(prefix.toLowerCase()));
  if (matches.length > 0) {
    activeSuggestions = matches.slice(0, 10); selectedSuggestionIdx = 0;
    renderSuggestions(); positionSuggestions();
  } else hideSuggestions();
}

function renderSuggestions() {
  suggestionsList.innerHTML = "";
  activeSuggestions.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = `suggestion-item ${idx === selectedSuggestionIdx ? 'selected' : ''}`;
    div.innerHTML = `<span class="suggestion-icon icon-${item.type}">${item.type}</span><span>${item.name}</span>`;
    div.onclick = () => insertSuggestion(item);
    suggestionsList.appendChild(div);
  });
  suggestionsDoc.innerText = activeSuggestions[selectedSuggestionIdx].desc;
  suggestionsMenu.style.display = 'flex'; suggestionsVisible = true;
}

function positionSuggestions() {
  highlightCode(editor.selectionStart);
  const marker = document.getElementById('intellisense-marker');
  if (marker) {
    const rect = marker.getBoundingClientRect(); const wrap = document.getElementById('editor-container').getBoundingClientRect();
    suggestionsMenu.style.top = `${rect.bottom - wrap.top + 5}px`; suggestionsMenu.style.left = `${rect.left - wrap.left}px`;
  }
}

function insertSuggestion(item) {
  const textBefore = editor.value.substring(0, editor.selectionStart);
  const lastWord = textBefore.match(/[a-zA-Z_0-9.:-]+$/);
  const prefix = lastWord ? lastWord[0] : "";
  const start = editor.selectionStart - prefix.length; const end = editor.selectionStart;
  editor.value = editor.value.substring(0, start) + item.name + editor.value.substring(end);
  editor.selectionStart = editor.selectionEnd = start + item.name.length;
  hideSuggestions(); syncEditor(); editor.focus();
}

function hideSuggestions() { suggestionsMenu.style.display = 'none'; suggestionsVisible = false; }

// --- CURRICULUM LOGIC ---
function renderSidebar() {
  const list = document.getElementById('curriculum-list'); if (!list) return; list.innerHTML = '';
  courseData.forEach((mod, mIdx) => {
    const isCompleted = completedModules.includes(mIdx);
    const group = document.createElement('div'); group.className = 'module-group';
    group.innerHTML = `<div class="module-title" onclick="loadLesson(${mIdx}, 0)">${isCompleted ? '✅ ' : ''}${mod.title}</div>`;
    mod.lessons.forEach((lesson, lIdx) => {
      const link = document.createElement('div');
      link.className = `lesson-link ${currentMIdx === mIdx && currentLIdx === lIdx ? 'active' : ''}`;
      link.innerText = lesson.name;
      link.onclick = (e) => { e.stopPropagation(); loadLesson(mIdx, lIdx); };
      group.appendChild(link);
    });
    list.appendChild(group);
  });
}

function loadLesson(mIdx, lIdx) {
  currentMIdx = mIdx; currentLIdx = lIdx;
  const lesson = courseData[mIdx].lessons[lIdx];
  document.getElementById('lesson-content').innerHTML = `<div class="module-tag">${courseData[mIdx].title.toUpperCase()}</div><h2>${lesson.name}</h2>${lesson.content}`;
  document.getElementById('hint-content').innerText = lesson.hint;
  document.getElementById('solution-content').innerText = lesson.solution;
  document.getElementById('hint-content').style.display = 'none';
  document.getElementById('solution-content').style.display = 'none';
  document.getElementById('tool-section').style.display = 'block';
  syncEditor(); renderSidebar();
}

// --- EXECUTION ENGINE ---
const appendToTerminal = (args, type) => {
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  const message = Array.from(args).map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
  entry.innerHTML = `<span style="color: rgba(255,255,255,0.3); font-size: 10px;">[${new Date().toLocaleTimeString()}]</span> <span style="margin-left:8px;">${message}</span>`;
  logContainer.appendChild(entry);
  logContainer.scrollTop = logContainer.scrollHeight;
};

const customConsole = { log: (...a) => appendToTerminal(a, 'info'), error: (...a) => appendToTerminal(a, 'error'), warn: (...a) => appendToTerminal(a, 'warn') };

window.runEditorCode = () => {
  logContainer.innerHTML = '<div style="color: var(--accent); font-size: 11px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">-- EXECUTING PROCEDURE --</div>';
  const code = editor.value;
  if (code.trim().length < 2) return;

  if (activeLanguage === 'javascript') {
    executeJS(code);
  } else if (activeLanguage === 'python') {
    runPythonLocal(code);
  } else {
    // Multi-language Engine Bridge
    const transpilerMap = { cpp: 'transpileCPP', java: 'transpileJava' };
    const method = transpilerMap[activeLanguage];
    if (method) {
      google.script.run.withSuccessHandler(jsCode => executeJS(jsCode)).withFailureHandler(e => appendToTerminal([e.message], 'error'))[method](code);
    }
  }
};

function executeJS(jsCode) {
  // Sandboxed iframe execution to prevent DOM wipeouts
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.sandbox = "allow-scripts";
  document.body.appendChild(iframe);
  
  const listener = function(e) {
    if (e.data.type === 'log') appendToTerminal(e.data.args, e.data.logType);
    if (e.data.type === 'prompt') {
      const v = window.prompt(e.data.msg);
      appendToTerminal([`[INPUT]: ${v}`], 'warn');
      iframe.contentWindow.postMessage({ type: 'promptReturn', val: v }, '*');
    }
    if (e.data.type === 'done') {
      verifyChallenge(jsCode);
      window.removeEventListener('message', listener);
      iframe.remove();
    }
    if (e.data.type === 'error') {
      appendToTerminal([e.data.msg], 'error');
      window.removeEventListener('message', listener);
      iframe.remove();
    }
  };
  window.addEventListener('message', listener);

  const html = `
    <script>
      let promptCallback = null;
      window.addEventListener('message', (e) => {
        if(e.data.type === 'promptReturn' && promptCallback) promptCallback(e.data.val);
      });
      const customConsole = {
        log: (...a) => parent.postMessage({type: 'log', logType: 'info', args: a}, '*'),
        warn: (...a) => parent.postMessage({type: 'log', logType: 'warn', args: a}, '*'),
        error: (...a) => parent.postMessage({type: 'log', logType: 'error', args: a}, '*')
      };
      window.console = customConsole;
      window.prompt = function(msg) {
         parent.postMessage({type: 'prompt', msg: msg}, '*');
         // Simulating sync prompt in async environment is complex without Atomics.
         // For sandboxed security, we sacrifice true sync prompts in this specific mock.
         return "Prompt Not Fully Supported In Sandbox";
      };
      try {
        ${jsCode}
        parent.postMessage({type: 'done'}, '*');
      } catch(err) {
        parent.postMessage({type: 'error', msg: err.message}, '*');
      }
    <\/script>
  `;
  iframe.srcdoc = html;
}

// Client-Side Python WebAssembly Engine
let pyodideInstance = null;
async function runPythonLocal(code) {
  if (!pyodideInstance) {
    appendToTerminal(['Initializing Python Wasm Engine (Pyodide)... This may take 5-10 seconds.'], 'warn');
    const script = document.createElement('script');
    script.src = "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js";
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
    try {
      pyodideInstance = await loadPyodide();
      pyodideInstance.setStdout({ batched: (msg) => appendToTerminal([msg], 'info') });
      pyodideInstance.setStderr({ batched: (msg) => appendToTerminal([msg], 'error') });
      appendToTerminal(['Python Wasm Engine Online.'], 'success');
    } catch(err) {
      appendToTerminal(['Failed to load Python Wasm: ' + err.message], 'error');
      return;
    }
  }
  try {
    await pyodideInstance.runPythonAsync(code);
    verifyChallenge(code);
  } catch(err) {
    appendToTerminal([err.message], 'error');
  }
}

function verifyChallenge(code) {
  const normalize = (s) => s.replace(/\/\/.*|\/\*[\s\S]*?\*\/|[\s;]/g, "").toLowerCase().trim();
  const sol = courseData[currentMIdx].lessons[currentLIdx].solution;
  if (normalize(code).includes(normalize(sol))) {
    document.getElementById('teacher-feedback').innerHTML = "<span style='color: var(--success);'>Verification successful. Core objective met. ✅</span>";
    if (!completedModules.includes(currentMIdx)) {
      completedModules.push(currentMIdx);
      localStorage.setItem('academy_progress', JSON.stringify(completedModules));
      
      // Cloud Sync Integration
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.saveProgressCloud(JSON.stringify(completedModules));
      }
      
      renderSidebar();
      updateXP();
      
      // Milestone Gamification
      if ([9, 19, 29, 39].includes(currentMIdx) || completedModules.length === courseData.length) {
        triggerConfetti();
      }
    }
  } else {
    document.getElementById('teacher-feedback').innerHTML = "<span style='color: #ff9800;'>Execution complete. logic verification failed. Review procedure.</span>";
  }
}

window.toggleTool = (t) => { const el = document.getElementById(`${t}-content`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; };

window.onload = () => {
  renderSidebar();
  editor.addEventListener('input', syncEditor);
  editor.addEventListener('scroll', () => { codeHighlighted.scrollTop = editor.scrollTop; codeHighlighted.scrollLeft = editor.scrollLeft; lineNums.scrollTop = editor.scrollTop; });
  editor.addEventListener('keydown', (e) => {
    if (suggestionsVisible && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
      e.preventDefault(); if (e.key === 'ArrowDown') selectedSuggestionIdx = (selectedSuggestionIdx + 1) % activeSuggestions.length;
      else selectedSuggestionIdx = (selectedSuggestionIdx - 1 + activeSuggestions.length) % activeSuggestions.length;
      renderSuggestions(); return;
    }
    if (suggestionsVisible && (e.key === 'Enter' || e.key === 'Tab')) { e.preventDefault(); insertSuggestion(activeSuggestions[selectedSuggestionIdx]); return; }
    if (e.key === 'Tab') {
      e.preventDefault(); const s = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.substring(0, s) + "    " + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = s + 4; syncEditor();
    }
  });
};
</script>

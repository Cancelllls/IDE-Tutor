<style>
/* ============================================================
   VS Code Dark+ Theme — Complete CSS
   Google Apps Script Web App IDE Clone
   ============================================================ */

/* ----------------------------------------------------------
   CSS Variables (:root)
   ---------------------------------------------------------- */
:root {
  --bg-titlebar: rgba(30, 30, 31, 0.85);
  --bg-activity: rgba(24, 24, 24, 0.8);
  --bg-side: rgba(37, 37, 38, 0.7);
  --bg-main: #121212;
  --bg-tabs: rgba(24, 24, 24, 0.6);
  --bg-terminal: #121212;
  --bg-input: rgba(49, 49, 49, 0.5);
  --text-main: #e0e0e0;
  --text-dark: #a0a0a0;
  --text-bright: #ffffff;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #007acc;
  --accent-glow: rgba(0, 122, 204, 0.4);
  --accent-hover: #1a8ad4;
  --tab-inactive: transparent;
  --tab-active: rgba(30, 30, 30, 0.8);
  --tab-hover: rgba(255, 255, 255, 0.05);
  --hover-bg: rgba(255, 255, 255, 0.08);
  --selected-bg: rgba(0, 122, 204, 0.3);
  --focus-border: #007fd4;
  --scrollbar-bg: transparent;
  --scrollbar-thumb: rgba(255, 255, 255, 0.1);
  --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
  --minimap-bg: rgba(255, 255, 255, 0.05);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.1);
  --badge-bg: #007acc;
  --badge-fg: #ffffff;
  --error-fg: #f48771;
  --warning-fg: #cca700;
  --info-fg: #3794ff;
  --success-fg: #89d185;
  --font-size: 14px;
  --line-height: 22px;
  color-scheme: dark;
}

/* ----------------------------------------------------------
   Base Styles
   ---------------------------------------------------------- */
body,
html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg-main);
  background-image: radial-gradient(circle at top right, rgba(0, 122, 204, 0.05), transparent 400px),
                    radial-gradient(circle at bottom left, rgba(86, 156, 214, 0.05), transparent 400px);
  color: var(--text-main);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ----------------------------------------------------------
   Title Bar
   ---------------------------------------------------------- */
.title-bar {
  height: 35px;
  background: var(--bg-titlebar);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  user-select: none;
  z-index: 100;
}

.menu-item {
  cursor: pointer;
  font-size: 13px;
  color: var(--text-main);
  padding: 0 10px;
  height: 35px;
  display: flex;
  align-items: center;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 4px;
}

.menu-item:hover {
  background: var(--hover-bg);
}

/* ----------------------------------------------------------
   Activity Bar
   ---------------------------------------------------------- */
.activity-bar {
  width: 52px;
  background: var(--bg-activity);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-right: var(--glass-border);
  user-select: none;
  z-index: 110;
}

.activity-icon {
  cursor: pointer;
  color: var(--text-dark);
  width: 52px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-left: 2px solid transparent;
  transition: all 0.2s ease;
  position: relative;
}

.activity-icon.active {
  color: var(--text-bright);
  border-left-color: var(--accent);
  background: linear-gradient(90deg, var(--selected-bg) 0%, transparent 100%);
}

.activity-icon:hover {
  color: var(--text-bright);
}

.activity-bottom-icons {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  margin-bottom: 4px;
}

.activity-badge {
  position: absolute;
  top: 8px;
  right: 6px;
  background: var(--badge-bg);
  color: var(--badge-fg);
  font-size: 9px;
  min-width: 16px;
  height: 16px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* ----------------------------------------------------------
   Sidebar
   ---------------------------------------------------------- */
.sidebar {
  width: 280px;
  background: var(--bg-side);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  display: flex;
  flex-direction: column;
  border-right: var(--glass-border);
  overflow: hidden;
  user-select: none;
  z-index: 5;
  transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.sidebar-title {
  padding: 0 20px;
  height: 40px;
  display: flex;
  align-items: center;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dark);
  font-weight: 700;
  border-bottom: var(--glass-border);
}

.sidebar-header {
  padding: 0 8px 0 20px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dark);
  font-weight: 800;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.03);
}

.sidebar-header:hover {
  color: var(--text-main);
  background: rgba(255, 255, 255, 0.05);
}

/* ----------------------------------------------------------
   File Explorer
   ---------------------------------------------------------- */
.file-search-box {
  padding: 10px 14px;
  border-bottom: var(--glass-border);
}

.file-search-box input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-main);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}

.file-search-box input:focus {
  border-color: var(--focus-border);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.file-item {
  padding: 0 10px 0 20px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  color: var(--text-dark);
  transition: all 0.1s ease;
  font-size: 13px;
  margin: 1px 6px;
  border-radius: 6px;
}

.file-item:hover {
  background: var(--hover-bg);
  color: var(--text-main);
}

.file-item.active {
  background: var(--selected-bg);
  color: var(--text-bright);
  font-weight: 500;
}

.file-name-container {
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.file-delete-btn {
  color: var(--text-dark);
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 8px;
  font-size: 14px;
  height: 22px;
  display: flex;
  align-items: center;
}

.file-item:hover .file-delete-btn {
  opacity: 1;
}

.file-delete-btn:hover {
  color: var(--error-fg);
}

/* ----------------------------------------------------------
   Search Panel
   ---------------------------------------------------------- */
.search-panel-inputs {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.search-panel-inputs input {
  background: var(--bg-input);
  border: 1px solid transparent;
  color: var(--text-main);
  padding: 4px 8px;
  border-radius: 2px;
  font-size: 13px;
  width: 100%;
  outline: none;
}

.search-panel-inputs input:focus {
  border-color: var(--focus-border);
}

.search-results-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.search-results-summary {
  font-size: 12px;
  color: var(--text-dark);
  padding: 6px 12px;
}

.search-file-block {
  margin: 0;
}

.search-file-header {
  font-weight: normal;
  color: var(--text-main);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 12px;
  height: 22px;
  font-size: 13px;
}

.search-file-header:hover {
  background: var(--hover-bg);
}

.search-file-header .chevron {
  font-size: 10px;
  transition: transform 0.15s;
  width: 16px;
  display: inline-flex;
}

.search-file-header .match-count {
  background: var(--badge-bg);
  color: var(--badge-fg);
  font-size: 10px;
  padding: 0 5px;
  border-radius: 10px;
  margin-left: auto;
  min-width: 18px;
  text-align: center;
  height: 16px;
  line-height: 16px;
}

.search-file-matches {
  padding-left: 24px;
}

.search-match-item {
  padding: 1px 8px;
  cursor: pointer;
  border-radius: 0;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 12px;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  height: 22px;
  line-height: 22px;
}

.search-match-item:hover {
  background: var(--hover-bg);
}

.match-line-num {
  color: var(--text-dark);
  margin-right: 4px;
  min-width: 30px;
  display: inline-block;
}

/* ----------------------------------------------------------
   Settings Panel
   ---------------------------------------------------------- */
.settings-panel-content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}

.setting-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.setting-group label {
  font-size: 12px;
  color: var(--text-main);
}

.setting-group select {
  background: var(--bg-input);
  border: 1px solid transparent;
  color: var(--text-main);
  padding: 4px 8px;
  border-radius: 2px;
  font-size: 13px;
  width: 100%;
  outline: none;
}

.setting-group select:focus {
  border-color: var(--focus-border);
}

/* ----------------------------------------------------------
   Debug Panel
   ---------------------------------------------------------- */
.debug-panel-content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.debug-play-btn {
  background: #388a34;
  color: white;
  border: none;
  padding: 6px 14px;
  font-weight: 600;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
  width: 100%;
  transition: background 0.15s;
}

.debug-play-btn:hover {
  background: #2d7329;
}

/* ----------------------------------------------------------
   Main Editor Area
   ---------------------------------------------------------- */
.main-editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ----------------------------------------------------------
   Tabs Bar
   ---------------------------------------------------------- */
.tabs-bar {
  height: 40px;
  background: var(--bg-tabs);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  overflow-x: auto;
  border-bottom: var(--glass-border);
}

.tab {
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--tab-inactive);
  cursor: pointer;
  color: var(--text-dark);
  font-size: 13px;
  min-width: 0;
  max-width: 220px;
  position: relative;
  user-select: none;
  gap: 8px;
  height: 40px;
  flex-shrink: 0;
  border-bottom: 2px solid transparent;
  transition: all 0.2s ease;
}

.tab:hover {
  background: var(--tab-hover);
  color: var(--text-main);
}

.tab.active {
  background: var(--tab-active);
  color: var(--text-bright);
  border-bottom-color: var(--accent);
  box-shadow: inset 0 -4px 10px -4px var(--accent-glow);
}

/* ----------------------------------------------------------
   Breadcrumbs
   ---------------------------------------------------------- */
.breadcrumbs {
  height: 28px;
  background: transparent;
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: var(--text-dark);
  font-size: 12px;
  user-select: none;
  border-bottom: var(--glass-border);
}

.breadcrumb-item {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
  border-radius: 2px;
}

.breadcrumb-item:hover {
  color: var(--text-main);
  background: var(--hover-bg);
}

.breadcrumb-separator {
  margin: 0 2px;
  color: var(--text-dark);
}

/* ----------------------------------------------------------
   Editor Split Workspace
   ---------------------------------------------------------- */
.editor-workspace-split {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

.editor-wrapper {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
  background: var(--bg-main);
}

/* ----------------------------------------------------------
   Line Numbers (Gutter)
   ---------------------------------------------------------- */
#line-numbers {
  width: 60px;
  background: var(--bg-main);
  color: var(--text-dark);
  text-align: right;
  padding: 4px 0;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: var(--font-size);
  line-height: var(--line-height);
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.line-num-item {
  display: block;
  width: 100%;
  height: var(--line-height);
  line-height: var(--line-height);
  padding-right: 16px;
  padding-left: 0;
  text-align: right;
}

.gutter-error {
  background: rgba(255, 0, 0, 0.15);
  color: #f48771 !important;
  border-left: 3px solid #f48771;
}

.gutter-warning {
  background: rgba(204, 167, 0, 0.1);
  color: #cca700 !important;
  border-left: 3px solid #cca700;
}

/* ----------------------------------------------------------
   Editor Lines
   ---------------------------------------------------------- */
.editor-line-normal {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
}

.editor-line-error {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
  background: rgba(255, 0, 0, 0.06);
  text-decoration: wavy underline #f48771;
}

.editor-line-warning {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
  background: rgba(204, 167, 0, 0.06);
  text-decoration: wavy underline #cca700;
}

/* ----------------------------------------------------------
   Editor Scroll Container
   ---------------------------------------------------------- */
.editor-scroll-container {
  position: relative;
  flex: 1;
  overflow: auto;
  background: var(--bg-main);
}

/* ----------------------------------------------------------
   Code Input & Highlighted Pre
   ---------------------------------------------------------- */
#code-input,
#code-highlighted {
  position: absolute;
  top: 0;
  left: 0;
  margin: 0;
  padding: 4px 4px 4px 4px;
  width: 100%;
  height: 100%;
  min-width: 100%;
  min-height: 100%;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: var(--font-size);
  line-height: var(--line-height);
  white-space: pre;
  word-wrap: normal;
  overflow: hidden;
}

#code-input {
  z-index: 2;
  color: transparent !important;
  -webkit-text-fill-color: transparent !important;
  background: transparent !important;
  caret-color: var(--text-main) !important;
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 4;
}

#code-highlighted {
  z-index: 1;
  pointer-events: none;
  color: var(--text-main);
  background: var(--bg-main);
}

#code-highlighted code {
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  display: block;
}

/* ----------------------------------------------------------
   Token Colors (VS Code Dark+ Exact)
   ---------------------------------------------------------- */
.token-keyword {
  color: #569cd6;
}

.token-string {
  color: #ce9178;
}

.token-comment {
  color: #6a9955;
  font-style: italic;
}

.token-number {
  color: #b5cea8;
}

.token-builtin {
  color: #4ec9b0;
}

.token-operator {
  color: #d4d4d4;
}

.token-punctuation {
  color: #d4d4d4;
}

.token-tag {
  color: #569cd6;
}

.token-attr {
  color: #9cdcfe;
}

.token-value {
  color: #ce9178;
}

.token-selector {
  color: #d7ba7d;
}

.token-property {
  color: #9cdcfe;
}

.token-preprocessor {
  color: #c586c0;
}

.token-annotation {
  color: #dcdcaa;
}

.token-decorator {
  color: #dcdcaa;
}

.token-macro {
  color: #dcdcaa;
}

.token-function {
  color: #dcdcaa;
}

/* ----------------------------------------------------------
   Minimap
   ---------------------------------------------------------- */
.minimap {
  width: 60px;
  background: var(--bg-main);
  position: absolute;
  right: 14px;
  top: 0;
  bottom: 0;
  overflow: hidden;
  opacity: 0.7;
  cursor: pointer;
  z-index: 3;
}

.minimap-content {
  transform: scaleX(0.4) scaleY(0.4);
  transform-origin: top left;
  pointer-events: none;
}

.minimap-slider {
  position: absolute;
  right: 0;
  width: 60px;
  background: var(--minimap-bg);
  border-radius: 2px;
  transition: opacity 0.2s;
}

.minimap:hover .minimap-slider {
  background: rgba(255, 255, 255, 0.15);
}

/* ----------------------------------------------------------
   Preview Pane
   ---------------------------------------------------------- */
.preview-pane {
  width: 50%;
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  background: white;
}

.preview-header {
  height: 35px;
  background: var(--bg-tabs);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: var(--text-main);
  justify-content: space-between;
  user-select: none;
}

.preview-iframe {
  flex: 1;
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

/* ----------------------------------------------------------
   Bottom Panel (Terminal / Problems)
   ---------------------------------------------------------- */
.bottom-panel {
  height: 240px;
  background: var(--bg-tabs);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-top: var(--glass-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
  transition: height 0.2s ease;
}

.bottom-panel-header {
  background: rgba(255, 255, 255, 0.02);
  border-bottom: var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  user-select: none;
  height: 38px;
  flex-shrink: 0;
}

.bottom-panel-tab {
  font-size: 12px;
  color: var(--text-dark);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 0 14px;
  height: 38px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 2px solid transparent;
  transition: all 0.2s ease;
  font-weight: 600;
}

.bottom-panel-tab.active {
  color: var(--text-bright);
  border-bottom-color: var(--accent);
}

/* ----------------------------------------------------------
   Terminal
   ---------------------------------------------------------- */
#terminal-output {
  padding: 12px 16px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  color: var(--text-main);
  white-space: pre-wrap;
  line-height: 1.6;
}

.terminal-input-row {
  display: flex;
  align-items: center;
  color: var(--text-main);
  font-family: 'Consolas', 'Courier New', monospace;
  margin-top: 2px;
}

.terminal-input-row input {
  background: transparent;
  border: none;
  color: var(--text-main);
  font-family: inherit;
  font-size: inherit;
  outline: none;
  flex: 1;
  margin-left: 5px;
}

/* ----------------------------------------------------------
   Problems Pane
   ---------------------------------------------------------- */
#problems-output {
  padding: 0;
  display: flex;
  flex-direction: column;
}

.problem-item {
  display: flex;
  gap: 8px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
  padding: 4px 12px;
  height: 22px;
  align-items: center;
}

.problem-item:hover {
  background: var(--hover-bg);
}

/* ----------------------------------------------------------
   Status Bar
   ---------------------------------------------------------- */
.status-bar {
  height: 22px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  font-size: 12px;
  color: white;
  user-select: none;
}

.status-bar-left {
  display: flex;
  align-items: center;
  gap: 0;
}

.status-bar-right {
  display: flex;
  align-items: center;
  gap: 0;
}

.status-item {
  padding: 0 6px;
  height: 22px;
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
  gap: 4px;
  white-space: nowrap;
}

.status-item:hover {
  background: rgba(255, 255, 255, 0.12);
}

.status-item svg {
  flex-shrink: 0;
}

/* ----------------------------------------------------------
   Suggestions / IntelliSense Menu
   ---------------------------------------------------------- */
.suggestions-menu {
  display: none;
  position: absolute;
  z-index: 10000;
  background: var(--bg-side);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: var(--glass-border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  border-radius: 12px;
  width: 500px;
  max-height: 280px;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
}

/* ----------------------------------------------------------
   Command Palette
   ---------------------------------------------------------- */
.command-palette-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

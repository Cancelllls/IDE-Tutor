<style>
/* ============================================================
   VS Code Dark+ Theme — Complete CSS
   Google Apps Script Web App IDE Clone
   ============================================================ */

/* ----------------------------------------------------------
   CSS Variables (:root)
   ---------------------------------------------------------- */
:root {
  --bg-titlebar: #323233;
  --bg-activity: #181818;
  --bg-side: #252526;
  --bg-main: #1e1e1e;
  --bg-tabs: #181818;
  --bg-terminal: #1e1e1e;
  --bg-input: #313131;
  --text-main: #cccccc;
  --text-dark: #858585;
  --text-bright: #ffffff;
  --border: #2b2b2b;
  --accent: #007acc;
  --accent-hover: #1a8ad4;
  --tab-inactive: #181818;
  --tab-active: #1e1e1e;
  --tab-hover: #2a2d2e;
  --hover-bg: #2a2d2e;
  --selected-bg: #04395e;
  --focus-border: #007fd4;
  --scrollbar-bg: transparent;
  --scrollbar-thumb: rgba(121, 121, 121, 0.4);
  --scrollbar-thumb-hover: rgba(100, 100, 100, 0.7);
  --minimap-bg: rgba(255, 255, 255, 0.1);
  --badge-bg: #007acc;
  --badge-fg: #ffffff;
  --error-fg: #f48771;
  --warning-fg: #cca700;
  --info-fg: #3794ff;
  --success-fg: #89d185;
  --font-size: 14px;
  --line-height: 20px;
  color-scheme: dark;
}

/* ----------------------------------------------------------
   Base Styles
   ---------------------------------------------------------- */
body,
html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: 'Segoe WPC', 'Segoe UI', sans-serif;
  overflow: hidden;
  font-size: 13px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ----------------------------------------------------------
   Title Bar
   ---------------------------------------------------------- */
.title-bar {
  height: 30px;
  background: var(--bg-titlebar);
  border-bottom: 1px solid rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  user-select: none;
  -webkit-app-region: drag;
}

.menu-items {
  display: flex;
  gap: 0;
}

.menu-item {
  cursor: pointer;
  font-size: 13px;
  color: var(--text-main);
  padding: 0 8px;
  height: 30px;
  display: flex;
  align-items: center;
  transition: background 0.1s;
}

.menu-item:hover {
  background: rgba(255, 255, 255, 0.1);
}

.title-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: var(--text-dark);
  pointer-events: none;
}

.window-controls {
  display: flex;
  gap: 0;
}

.window-control {
  width: 46px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--text-main);
  cursor: pointer;
}

.window-control:hover {
  background: rgba(255, 255, 255, 0.1);
}

.window-control.close:hover {
  background: #e81123;
  color: white;
}

/* ----------------------------------------------------------
   Workspace
   ---------------------------------------------------------- */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ----------------------------------------------------------
   Activity Bar
   ---------------------------------------------------------- */
.activity-bar {
  width: 48px;
  background: var(--bg-activity);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  border-right: none;
  user-select: none;
  z-index: 10;
}

.activity-icons {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.activity-icon {
  cursor: pointer;
  color: var(--text-dark);
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}

.activity-icon.active {
  color: var(--text-bright);
  border-left-color: var(--accent);
}

.activity-icon:hover {
  color: var(--text-bright);
}

.activity-bottom-icons {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  margin-bottom: 4px;
}

.activity-badge {
  position: absolute;
  top: 8px;
  right: 6px;
  background: var(--badge-bg);
  color: var(--badge-fg);
  font-size: 9px;
  min-width: 16px;
  height: 16px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* ----------------------------------------------------------
   Sidebar
   ---------------------------------------------------------- */
.sidebar {
  width: 260px;
  background: var(--bg-side);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
  user-select: none;
  z-index: 5;
  transition: width 0.15s;
}

.sidebar-panel {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

.sidebar-title {
  padding: 0 20px;
  height: 35px;
  display: flex;
  align-items: center;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dark);
  font-weight: 600;
}

.sidebar-header {
  padding: 0 8px 0 20px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dark);
  font-weight: 700;
  cursor: pointer;
}

.sidebar-header:hover {
  color: var(--text-main);
}

.sidebar-section-header {
  padding: 0 8px 0 20px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dark);
  font-weight: 700;
  cursor: pointer;
  background: var(--bg-side);
  border-top: 1px solid var(--border);
}

.sidebar-section-header:hover {
  color: var(--text-main);
}

.sidebar-actions {
  display: flex;
  gap: 2px;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-dark);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  font-size: 14px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}

.icon-btn:hover {
  color: var(--text-bright);
  background: var(--hover-bg);
}

/* ----------------------------------------------------------
   File Explorer
   ---------------------------------------------------------- */
.file-search-box {
  padding: 4px 8px;
  border-bottom: none;
}

.file-search-box input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid transparent;
  color: var(--text-main);
  padding: 3px 6px;
  border-radius: 2px;
  font-size: 12px;
  outline: none;
}

.file-search-box input:focus {
  border-color: var(--focus-border);
}

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.file-item {
  padding: 0 0 0 20px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  color: var(--text-main);
  transition: background 0.05s;
  font-size: 13px;
}

.file-item:hover {
  background: var(--hover-bg);
}

.file-item.active {
  background: var(--selected-bg);
}

.file-name-container {
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.file-delete-btn {
  color: var(--text-dark);
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 8px;
  font-size: 14px;
  height: 22px;
  display: flex;
  align-items: center;
}

.file-item:hover .file-delete-btn {
  opacity: 1;
}

.file-delete-btn:hover {
  color: var(--error-fg);
}

/* ----------------------------------------------------------
   Search Panel
   ---------------------------------------------------------- */
.search-panel-inputs {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.search-panel-inputs input {
  background: var(--bg-input);
  border: 1px solid transparent;
  color: var(--text-main);
  padding: 4px 8px;
  border-radius: 2px;
  font-size: 13px;
  width: 100%;
  outline: none;
}

.search-panel-inputs input:focus {
  border-color: var(--focus-border);
}

.search-results-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.search-results-summary {
  font-size: 12px;
  color: var(--text-dark);
  padding: 6px 12px;
}

.search-file-block {
  margin: 0;
}

.search-file-header {
  font-weight: normal;
  color: var(--text-main);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 12px;
  height: 22px;
  font-size: 13px;
}

.search-file-header:hover {
  background: var(--hover-bg);
}

.search-file-header .chevron {
  font-size: 10px;
  transition: transform 0.15s;
  width: 16px;
  display: inline-flex;
}

.search-file-header .match-count {
  background: var(--badge-bg);
  color: var(--badge-fg);
  font-size: 10px;
  padding: 0 5px;
  border-radius: 10px;
  margin-left: auto;
  min-width: 18px;
  text-align: center;
  height: 16px;
  line-height: 16px;
}

.search-file-matches {
  padding-left: 24px;
}

.search-match-item {
  padding: 1px 8px;
  cursor: pointer;
  border-radius: 0;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 12px;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  height: 22px;
  line-height: 22px;
}

.search-match-item:hover {
  background: var(--hover-bg);
}

.match-line-num {
  color: var(--text-dark);
  margin-right: 4px;
  min-width: 30px;
  display: inline-block;
}

/* ----------------------------------------------------------
   Settings Panel
   ---------------------------------------------------------- */
.settings-panel-content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}

.setting-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.setting-group label {
  font-size: 12px;
  color: var(--text-main);
}

.setting-group select {
  background: var(--bg-input);
  border: 1px solid transparent;
  color: var(--text-main);
  padding: 4px 8px;
  border-radius: 2px;
  font-size: 13px;
  width: 100%;
  outline: none;
}

.setting-group select:focus {
  border-color: var(--focus-border);
}

/* ----------------------------------------------------------
   Debug Panel
   ---------------------------------------------------------- */
.debug-panel-content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.debug-play-btn {
  background: #388a34;
  color: white;
  border: none;
  padding: 6px 14px;
  font-weight: 600;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
  width: 100%;
  transition: background 0.15s;
}

.debug-play-btn:hover {
  background: #2d7329;
}

/* ----------------------------------------------------------
   Main Editor Area
   ---------------------------------------------------------- */
.main-editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ----------------------------------------------------------
   Tabs Bar
   ---------------------------------------------------------- */
.tabs-bar {
  height: 35px;
  background: var(--bg-tabs);
  display: flex;
  overflow-x: auto;
  border-bottom: none;
  scroll-snap-type: x mandatory;
}

.tabs-bar::-webkit-scrollbar {
  height: 3px;
}

.tab {
  display: flex;
  align-items: center;
  padding: 0 10px;
  background: var(--tab-inactive);
  border-right: none;
  cursor: pointer;
  color: var(--text-dark);
  font-size: 13px;
  min-width: 0;
  max-width: 200px;
  position: relative;
  user-select: none;
  gap: 6px;
  height: 35px;
  flex-shrink: 0;
  border-top: 1px solid transparent;
}

.tab:hover {
  background: var(--tab-hover);
}

.tab.active {
  background: var(--tab-active);
  color: var(--text-bright);
  border-top-color: var(--accent);
}

.tab-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.tab-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tab-close {
  font-size: 14px;
  border-radius: 4px;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  opacity: 0;
  color: var(--text-dark);
}

.tab:hover .tab-close {
  opacity: 1;
}

.tab.active .tab-close {
  opacity: 1;
}

.tab-close:hover {
  background: rgba(255, 255, 255, 0.15);
  color: var(--text-bright);
}

.dirty-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-main);
  flex-shrink: 0;
}

/* ----------------------------------------------------------
   Breadcrumbs
   ---------------------------------------------------------- */
.breadcrumbs {
  height: 22px;
  background: var(--bg-main);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  color: var(--text-dark);
  font-size: 12px;
  user-select: none;
  gap: 0;
}

.breadcrumb-item {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
  border-radius: 2px;
}

.breadcrumb-item:hover {
  color: var(--text-main);
  background: var(--hover-bg);
}

.breadcrumb-separator {
  margin: 0 2px;
  color: var(--text-dark);
}

/* ----------------------------------------------------------
   Editor Split Workspace
   ---------------------------------------------------------- */
.editor-workspace-split {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

.editor-wrapper {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
  background: var(--bg-main);
}

/* ----------------------------------------------------------
   Line Numbers (Gutter)
   ---------------------------------------------------------- */
#line-numbers {
  width: 60px;
  background: var(--bg-main);
  color: var(--text-dark);
  text-align: right;
  padding: 4px 0;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: var(--font-size);
  line-height: var(--line-height);
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.line-num-item {
  display: block;
  width: 100%;
  height: var(--line-height);
  line-height: var(--line-height);
  padding-right: 16px;
  padding-left: 0;
  text-align: right;
}

.gutter-error {
  background: rgba(255, 0, 0, 0.15);
  color: #f48771 !important;
  border-left: 3px solid #f48771;
}

.gutter-warning {
  background: rgba(204, 167, 0, 0.1);
  color: #cca700 !important;
  border-left: 3px solid #cca700;
}

/* ----------------------------------------------------------
   Editor Lines
   ---------------------------------------------------------- */
.editor-line-normal {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
}

.editor-line-error {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
  background: rgba(255, 0, 0, 0.06);
  text-decoration: wavy underline #f48771;
}

.editor-line-warning {
  height: var(--line-height);
  line-height: var(--line-height);
  width: 100%;
  padding-left: 4px;
  background: rgba(204, 167, 0, 0.06);
  text-decoration: wavy underline #cca700;
}

/* ----------------------------------------------------------
   Editor Scroll Container
   ---------------------------------------------------------- */
.editor-scroll-container {
  position: relative;
  flex: 1;
  overflow: auto;
  background: var(--bg-main);
}

/* ----------------------------------------------------------
   Code Input & Highlighted Pre
   ---------------------------------------------------------- */
#code-input,
#code-highlighted {
  position: absolute;
  top: 0;
  left: 0;
  margin: 0;
  padding: 4px 4px 4px 4px;
  width: 100%;
  height: 100%;
  min-width: 100%;
  min-height: 100%;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: var(--font-size);
  line-height: var(--line-height);
  white-space: pre;
  word-wrap: normal;
  overflow: hidden;
}

#code-input {
  z-index: 2;
  color: transparent !important;
  -webkit-text-fill-color: transparent !important;
  background: transparent !important;
  caret-color: var(--text-main) !important;
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 4;
}

#code-highlighted {
  z-index: 1;
  pointer-events: none;
  color: var(--text-main);
  background: var(--bg-main);
}

#code-highlighted code {
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  display: block;
}

/* ----------------------------------------------------------
   Token Colors (VS Code Dark+ Exact)
   ---------------------------------------------------------- */
.token-keyword {
  color: #569cd6;
}

.token-string {
  color: #ce9178;
}

.token-comment {
  color: #6a9955;
  font-style: italic;
}

.token-number {
  color: #b5cea8;
}

.token-builtin {
  color: #4ec9b0;
}

.token-operator {
  color: #d4d4d4;
}

.token-punctuation {
  color: #d4d4d4;
}

.token-tag {
  color: #569cd6;
}

.token-attr {
  color: #9cdcfe;
}

.token-value {
  color: #ce9178;
}

.token-selector {
  color: #d7ba7d;
}

.token-property {
  color: #9cdcfe;
}

.token-preprocessor {
  color: #c586c0;
}

.token-annotation {
  color: #dcdcaa;
}

.token-decorator {
  color: #dcdcaa;
}

.token-macro {
  color: #dcdcaa;
}

.token-function {
  color: #dcdcaa;
}

/* ----------------------------------------------------------
   Minimap
   ---------------------------------------------------------- */
.minimap {
  width: 60px;
  background: var(--bg-main);
  position: absolute;
  right: 14px;
  top: 0;
  bottom: 0;
  overflow: hidden;
  opacity: 0.7;
  cursor: pointer;
  z-index: 3;
}

.minimap-content {
  transform: scaleX(0.4) scaleY(0.4);
  transform-origin: top left;
  pointer-events: none;
}

.minimap-slider {
  position: absolute;
  right: 0;
  width: 60px;
  background: var(--minimap-bg);
  border-radius: 2px;
  transition: opacity 0.2s;
}

.minimap:hover .minimap-slider {
  background: rgba(255, 255, 255, 0.15);
}

/* ----------------------------------------------------------
   Preview Pane
   ---------------------------------------------------------- */
.preview-pane {
  width: 50%;
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  background: white;
}

.preview-header {
  height: 35px;
  background: var(--bg-tabs);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: var(--text-main);
  justify-content: space-between;
  user-select: none;
}

.preview-iframe {
  flex: 1;
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

/* ----------------------------------------------------------
   Bottom Panel (Terminal / Problems)
   ---------------------------------------------------------- */
.bottom-panel {
  height: 220px;
  background: var(--bg-main);
  border-top: 1px solid var(--accent);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
  transition: height 0.15s;
}

.bottom-panel-header {
  background: var(--bg-tabs);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  user-select: none;
  height: 35px;
  flex-shrink: 0;
}

.bottom-panel-tabs {
  display: flex;
  gap: 0;
}

.bottom-panel-tab {
  font-size: 13px;
  color: var(--text-dark);
  cursor: pointer;
  text-transform: uppercase;
  padding: 0 12px;
  height: 35px;
  display: flex;
  align-items: center;
  gap: 5px;
  border-bottom: 1px solid transparent;
  transition: all 0.1s;
}

.bottom-panel-tab.active {
  color: var(--text-bright);
  border-bottom-color: var(--accent);
}

.bottom-panel-tab:hover {
  color: var(--text-main);
}

.panel-badge {
  background: var(--badge-bg);
  color: var(--badge-fg);
  font-size: 10px;
  padding: 0 5px;
  border-radius: 10px;
  min-width: 18px;
  height: 16px;
  line-height: 16px;
  text-align: center;
}

.bottom-panel-actions {
  display: flex;
  gap: 4px;
  align-items: center;
}

.bottom-panel-content {
  flex: 1;
  overflow-y: auto;
  position: relative;
}

.panel-pane {
  display: none;
  height: 100%;
  width: 100%;
}

.panel-pane.active {
  display: block;
}

/* ----------------------------------------------------------
   Terminal
   ---------------------------------------------------------- */
#terminal-output {
  padding: 8px 12px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 13px;
  color: var(--text-main);
  white-space: pre-wrap;
  line-height: 1.4;
}

.terminal-input-row {
  display: flex;
  align-items: center;
  color: var(--text-main);
  font-family: 'Consolas', 'Courier New', monospace;
  margin-top: 2px;
